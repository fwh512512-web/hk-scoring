<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>и·ҜеўғиЎҢж—… жҲҝеӢҷиЁҲеҲҶзі»зөұ</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fff;--bg2:#f7f7f5;--bg3:#efefed;
  --text:#1a1a1a;--text2:#6b6b6b;--text3:#b0b0b0;
  --border:#e8e8e6;--border2:#d0d0ce;
  --primary:#1a1a1a;--pt:#fff;
  --teal:#007a6e;--teal-bg:#e6f4f2;--teal-text:#005a51;
  --gold:#c8960a;--gold-bg:#fdf6e3;--gold-text:#9a7200;
  --danger-bg:#fff0f0;--danger:#c00;--danger-border:#fcc;
  --success-bg:#f0fff4;--success:#0a6e2e;
  --orange:#e65c00;--orange-bg:#fff3e0;
  --r:10px;--rs:6px;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1c1c1e;--bg2:#2c2c2e;--bg3:#3a3a3c;
  --text:#f2f2f7;--text2:#aeaeb2;--text3:#636366;
  --border:#3a3a3c;--border2:#48484a;
  --primary:#f2f2f7;--pt:#1c1c1e;
  --teal-bg:#0d2e2b;--teal-text:#4ecdc4;
  --gold-bg:#2e2600;--gold-text:#f5c842;
  --orange-bg:#2e1800;
}}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;color:var(--text);background:var(--bg3);min-height:100vh}
.app{max-width:480px;margin:0 auto;padding-bottom:72px}
.header{background:var(--bg);padding:14px 16px 10px;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:20}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.header-title{font-size:16px;font-weight:700;letter-spacing:-.3px}
.cycle-nav{display:flex;align-items:center;gap:8px}
.cycle-nav button{width:28px;height:28px;border:1px solid var(--border2);border-radius:50%;background:var(--bg2);cursor:pointer;font-size:16px;color:var(--text);display:flex;align-items:center;justify-content:center}
.cycle-label{font-size:12px;color:var(--text2);white-space:nowrap}
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--bg);border-top:1px solid var(--border);display:flex;z-index:20;padding-bottom:env(safe-area-inset-bottom)}
.nav-btn{flex:1;padding:8px 4px 10px;text-align:center;cursor:pointer;font-size:10px;color:var(--text2);border:none;background:none;transition:color .15s}
.nav-btn i{display:block;font-size:20px;margin-bottom:1px}
.nav-btn.active{color:var(--teal);font-weight:600}
.page{display:none;padding:12px}
.page.active{display:block}
/* cards */
.card{background:var(--bg);border-radius:var(--r);border:1px solid var(--border);margin-bottom:10px;overflow:hidden}
.card-hd{padding:12px 14px;border-bottom:1px solid var(--border);font-weight:600;font-size:13px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.card-bd{padding:12px 14px}
/* dashboard */
.dash-welcome{background:var(--teal);border-radius:var(--r);padding:16px;margin-bottom:10px;color:#fff}
.dash-welcome h2{font-size:18px;font-weight:700;margin-bottom:2px}
.dash-welcome p{font-size:12px;opacity:.8}
.staff-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.staff-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:12px;cursor:pointer;transition:border-color .15s;text-align:center}
.staff-card:active{opacity:.7}
.staff-card .avatar{width:44px;height:44px;border-radius:50%;background:var(--teal-bg);color:var(--teal-text);font-size:18px;font-weight:700;display:flex;align-items:center;justify-content:center;margin:0 auto 8px}
.staff-card .s-name{font-weight:600;font-size:14px;margin-bottom:2px}
.staff-card .s-score{font-size:22px;font-weight:700;color:var(--teal);line-height:1}
.staff-card .s-label{font-size:10px;color:var(--text2);margin-top:2px}
.staff-card .s-pt{font-size:11px;color:var(--text2)}
.dash-block{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;margin-bottom:10px;cursor:pointer;display:flex;align-items:center;gap:12px}
.dash-block:active{opacity:.7}
.dash-block-icon{width:40px;height:40px;border-radius:var(--rs);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.dash-block-info{flex:1}
.dash-block-title{font-weight:600;font-size:14px;margin-bottom:2px}
.dash-block-sub{font-size:11px;color:var(--text2)}
.dash-block-arrow{color:var(--text3);font-size:18px}
/* person detail */
.back-btn{display:flex;align-items:center;gap:6px;color:var(--teal);font-size:13px;cursor:pointer;padding:10px 0 4px;font-weight:500}
.person-hero{background:var(--teal);border-radius:var(--r);padding:20px;margin-bottom:10px;color:#fff;text-align:center}
.person-hero .p-avatar{width:60px;height:60px;border-radius:50%;background:rgba(255,255,255,.2);font-size:26px;font-weight:700;display:flex;align-items:center;justify-content:center;margin:0 auto 10px}
.person-hero .p-name{font-size:20px;font-weight:700}
.person-hero .p-type{font-size:12px;opacity:.7;margin-bottom:12px}
.score-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:12px}
.score-cell{background:rgba(255,255,255,.15);border-radius:var(--rs);padding:8px;text-align:center}
.score-cell .sc-val{font-size:20px;font-weight:700}
.score-cell .sc-label{font-size:10px;opacity:.75;margin-top:2px}
.score-total{margin-top:10px;text-align:center}
.score-total .st-val{font-size:32px;font-weight:800}
.score-total .st-label{font-size:12px;opacity:.75}
/* floor tabs */
.floor-tabs{display:flex;gap:6px;padding:10px 14px;overflow-x:auto;border-bottom:1px solid var(--border);scrollbar-width:none}
.floor-tabs::-webkit-scrollbar{display:none}
.ftab{padding:5px 14px;border-radius:20px;font-size:12px;cursor:pointer;white-space:nowrap;border:1px solid var(--border2);background:var(--bg2);color:var(--text2);flex-shrink:0}
.ftab.active{background:var(--primary);color:var(--pt);border-color:var(--primary)}
/* maint table */
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
table.mt{width:100%;border-collapse:collapse;font-size:11px}
table.mt th{background:var(--bg2);padding:8px 4px;text-align:center;border:1px solid var(--border);font-weight:500;white-space:nowrap}
table.mt th.ic{text-align:left;min-width:88px;padding-left:6px}
table.mt td{border:1px solid var(--border);text-align:center;padding:2px}
table.mt td.ic{text-align:left;padding:5px 6px;background:var(--bg2);font-weight:500}
.cb{width:100%;min-height:48px;border:none;background:transparent;cursor:pointer;font-size:11px;color:var(--text2);padding:4px 2px;border-radius:3px;line-height:1.5}
.cb.done{background:var(--teal-bg);color:var(--teal-text);font-weight:600}
.cb:active{opacity:.6}
/* task items */
.task-item{border:1px solid var(--border);border-radius:var(--rs);margin-bottom:8px;background:var(--bg);overflow:hidden}
.task-item.saved{border-color:var(--teal)}
.task-item.dirty{border-color:var(--orange)}
.task-top{padding:10px 12px 8px}
.task-footer{display:flex;align-items:center;justify-content:space-between;padding:7px 12px;border-top:1px solid var(--border);background:var(--bg2)}
.task-status{font-size:11px;color:var(--text3)}
.task-status.is-saved{color:var(--teal)}
.task-status.is-dirty{color:var(--orange)}
.task-actions{display:flex;gap:6px}
.task-btn{padding:5px 12px;border-radius:20px;font-size:12px;cursor:pointer;border:1px solid var(--border2);background:var(--bg);color:var(--text2);font-weight:500}
.task-btn.save-btn{background:var(--teal);color:#fff;border-color:var(--teal)}
.task-btn.clear-btn{background:var(--danger-bg);color:var(--danger);border-color:var(--danger-border)}
.task-btn:active{opacity:.7}
.task-hd{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;gap:8px}
.task-name{font-size:13px;font-weight:600;line-height:1.3}
.task-score-badge{font-size:10px;color:var(--text2);white-space:nowrap;flex-shrink:0}
.chips{display:flex;gap:6px;flex-wrap:wrap}
.chip{padding:6px 11px;border-radius:20px;font-size:12px;cursor:pointer;border:1px solid var(--border2);background:var(--bg2);color:var(--text2);user-select:none}
.chip.on{background:var(--primary);color:var(--pt);border-color:var(--primary)}
.chip.pt-chip{border-style:dashed}
.num-row{display:flex;align-items:center;gap:8px;margin-top:8px}
.num-row label{font-size:12px;color:var(--text2);white-space:nowrap}
.num-row input{width:48px;text-align:center;padding:6px 4px}
.counter-btn{width:32px;height:32px;border-radius:50%;border:1px solid var(--border2);background:var(--bg2);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text);flex-shrink:0;line-height:1}
.counter-btn:active{opacity:.6}
/* forms */
input,select,textarea{width:100%;padding:9px 11px;border:1px solid var(--border2);border-radius:var(--rs);font-size:14px;background:var(--bg);color:var(--text);outline:none;-webkit-appearance:none}
input:focus,select:focus,textarea:focus{border-color:var(--teal)}
.form-row{margin-bottom:12px}
.form-label{font-size:12px;color:var(--text2);margin-bottom:4px;display:block;font-weight:500}
/* buttons */
.btn{padding:9px 16px;border-radius:var(--rs);font-size:13px;cursor:pointer;border:1px solid var(--border2);background:var(--bg2);color:var(--text);font-weight:500}
.btn-primary{background:var(--teal);color:#fff;border-color:var(--teal)}
.btn-danger{background:var(--danger-bg);color:var(--danger);border-color:var(--danger-border)}
.btn-block{width:100%;padding:12px;font-size:14px;text-align:center}
.btn:active{opacity:.75}
/* summary/log */
.sum-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)}
.sum-row:last-child{border-bottom:none}
.log-item{background:var(--bg2);border-radius:var(--rs);padding:8px 11px;margin-bottom:6px}
.log-date{font-weight:600;font-size:12px;margin-bottom:3px}
.log-detail{font-size:11px;color:var(--text2);line-height:1.6}
/* defect */
.def-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)}
.def-row:last-child{border-bottom:none}
.def-ctrls{display:flex;align-items:center;gap:8px}
.def-count{font-size:20px;font-weight:700;min-width:32px;text-align:center}
.def-btn{width:32px;height:32px;border-radius:50%;border:1px solid var(--border2);background:var(--bg2);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text)}
/* work log table */
.wl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
table.wl{width:100%;border-collapse:collapse;font-size:11px}
table.wl th{background:var(--bg2);padding:6px 4px;border:1px solid var(--border);font-weight:500;white-space:nowrap;text-align:center}
table.wl th.date-col{text-align:left;min-width:52px}
table.wl td{border:1px solid var(--border);padding:5px 4px;text-align:center;font-size:11px;color:var(--text2)}
table.wl td.date-col{text-align:left;font-weight:600;color:var(--text);background:var(--bg2)}
table.wl td.has{background:var(--teal-bg);color:var(--teal-text);font-weight:500}
/* modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;align-items:flex-end;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--bg);border-radius:var(--r) var(--r) 0 0;padding:20px;width:100%;max-width:480px;max-height:88vh;overflow-y:auto}
.modal-title{font-size:16px;font-weight:700;margin-bottom:16px}
.modal-btns{display:flex;gap:8px;margin-top:16px}
.modal-btns .btn{flex:1;text-align:center}
/* misc */
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600}
.badge-full{background:var(--teal-bg);color:var(--teal-text)}
.badge-pt{background:var(--bg2);color:var(--text2);border:1px dashed var(--border2)}
.empty{text-align:center;padding:28px;color:var(--text3);font-size:13px}
.empty i{font-size:28px;display:block;margin-bottom:8px}
.toast{position:fixed;bottom:82px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;padding:9px 20px;border-radius:20px;font-size:13px;z-index:300;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap;max-width:320px;text-align:center}
.toast.show{opacity:1}
.parsed-box{border:1px solid var(--border);border-radius:var(--rs);padding:10px;margin-top:8px;background:var(--bg2)}
.progress-bar{height:6px;background:var(--border);border-radius:3px;overflow:hidden;margin-top:4px}
.progress-fill{height:100%;background:var(--teal);border-radius:3px;transition:width .3s}
.date-bar{background:var(--bg);border-bottom:1px solid var(--border);padding:10px 14px;display:flex;align-items:center;gap:10px}
.date-bar label{font-size:12px;color:var(--text2);white-space:nowrap;font-weight:500}
.date-bar input{flex:1}
.settings-row{display:flex;align-items:center;gap:8px;padding:10px 0;border-bottom:1px solid var(--border)}
.settings-row:last-child{border-bottom:none}
.tag{display:inline-block;padding:1px 6px;border-radius:4px;font-size:10px}
</style>
</head>
<body>
<div class="app">
<div class="header">
  <div class="header-top">
    <div class="header-title">и·ҜеўғиЎҢж—… жҲҝеӢҷиЁҲеҲҶ</div>
    <div id="sync-status" style="font-size:10px;display:flex;align-items:center;gap:3px"></div>
    <div class="cycle-nav">
      <button onclick="changeMonth(-1)">&#8249;</button>
      <span class="cycle-label" id="cycle-label"></span>
      <button onclick="changeMonth(1)">&#8250;</button>
    </div>
  </div>
</div>

<!-- е„ҖиЎЁжқҝ -->
<div id="page-dash" class="page active">
  <div id="dash-content"></div>
</div>

<!-- дҝқйӨҠ -->
<div id="page-maint" class="page">
  <div class="card">
    <div class="date-bar">
      <label>ж—Ҙжңҹ</label>
      <input type="text" id="maint-date" placeholder="ијёе…Ҙ0612иҮӘеӢ•её¶е…Ҙ" maxlength="8"
        oninput="parseMaintDate(this)" style="max-width:180px">
      <span id="maint-date-display" style="font-size:12px;color:var(--teal);white-space:nowrap"></span>
    </div>
    <div class="floor-tabs" id="floor-tabs"></div>
    <div id="maint-body"></div>
  </div>
</div>

<!-- жҜҸж—Ҙ -->
<div id="page-daily" class="page">
  <div class="card" style="margin-bottom:10px">
    <div class="date-bar">
      <label>ж—Ҙжңҹ</label>
      <input type="date" id="daily-date" style="max-width:160px">
    </div>
    <div class="card-bd" style="padding-bottom:8px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
        <label class="form-label" style="margin-bottom:0">иІјдёҠжҺғжҲҝж—ҘиӘҢпјҲйҒёеЎ«пјү</label>
        <button class="btn" style="padding:4px 10px;font-size:11px" onclick="clearJournal()">жё…йҷӨ</button>
      </div>
      <textarea id="journal-text" rows="3" placeholder="е°ҮLINEж•ҙжҲҝж—ҘиӘҢиІјеңЁйҖҷиЈЎпјҢиҮӘеӢ•и§ЈжһҗжҹҘжҲҝй–“ж•ё..."></textarea>
      <button class="btn btn-primary" style="width:100%;margin-top:6px" onclick="parseJournal()">и§Јжһҗж—ҘиӘҢ</button>
      <div id="parse-result"></div>
    </div>
  </div>
  <div id="daily-tasks"></div>
  <div class="card">
    <div class="card-hd">йЎҚеӨ–еҠ еҲҶпјҲдё»з®ЎеҲӨж–·пјү</div>
    <div class="card-bd">
      <textarea id="extra-note" rows="2" placeholder="иҮӘз”ұеЎ«еҜ«й …зӣ®иҲҮеҲҶж•ё..."></textarea>
      <button class="btn btn-primary btn-block" style="margin-top:8px" onclick="saveExtra()">е„ІеӯҳйЎҚеӨ–й …зӣ®</button>
    </div>
  </div>
</div>

<!-- зјәеӨұ -->
<div id="page-defect" class="page">
  <div class="card">
    <div class="card-hd">жң¬жңҹзјәеӨұзөұиЁҲ <span style="font-size:11px;color:var(--text2);font-weight:400">жҜҸ5й»һжүЈ1е“ҒиіӘеҲҶ</span></div>
    <div class="card-bd" id="defect-summary"></div>
  </div>
  <div class="card">
    <div class="card-hd">ж–°еўһзјәеӨұзҙҖйҢ„</div>
    <div class="card-bd">
      <div class="form-row"><label class="form-label">ж—Ҙжңҹ</label><input type="date" id="defect-date"></div>
      <div class="form-row">
        <label class="form-label">жҲҝиҷҹ <span style="font-weight:400;color:var(--text3)">пјҲијёе…ҘеҫҢиҮӘеӢ•её¶е…ҘиІ иІ¬дәәпјү</span></label>
        <input type="text" id="defect-room" placeholder="дҫӢпјҡ301" oninput="onDefectRoomInput()" autocomplete="off">
        <div id="defect-room-hint" style="font-size:11px;margin-top:4px;min-height:16px"></div>
      </div>
      <div class="form-row"><label class="form-label">иІ иІ¬дәә</label><div class="chips" id="defect-chips"></div></div>
      <div class="form-row"><label class="form-label">зјәеӨұиӘӘжҳҺ</label><input type="text" id="defect-note" placeholder="дҫӢпјҡеҝҳиЁҳж”ҫиҢ¶еҢ…гҖҒжңүй«’жұҷ..."></div>
      <button class="btn btn-primary btn-block" onclick="addDefect()">ж–°еўһ</button>
    </div>
  </div>
  <div class="card">
    <div class="card-hd">зјәеӨұзҙҖйҢ„еҲ—иЎЁ</div>
    <div id="defect-list" style="padding:0 14px 14px"></div>
  </div>
</div>

<!-- иЁӯе®ҡ -->
<div id="page-settings" class="page">
  <div class="card">
    <div class="card-hd">е“Ўе·Ҙз®ЎзҗҶ</div>
    <div class="card-bd">
      <div id="staff-list"></div>
      <div style="display:flex;gap:6px;margin-top:10px">
        <input id="new-name" placeholder="е§“еҗҚ" style="flex:1">
        <select id="new-type" style="width:72px"><option value="full">жӯЈиҒ·</option><option value="pt">PT</option></select>
        <button class="btn btn-primary" onclick="addStaff()">ж–°еўһ</button>
      </div>
    </div>
  </div>
  <div class="card">
    <div class="card-hd">жЁ“еұӨжЁ“дё»</div>
    <div class="card-bd" id="floor-settings"></div>
  </div>
</div>

</div><!-- /app -->

<nav class="bottom-nav">
  <button class="nav-btn active" onclick="switchPage('dash',this)"><i class="ti ti-layout-dashboard"></i>е„ҖиЎЁжқҝ</button>
  <button class="nav-btn" onclick="switchPage('maint',this)"><i class="ti ti-home-check"></i>дҝқйӨҠ</button>
  <button class="nav-btn" onclick="switchPage('daily',this)"><i class="ti ti-clipboard-list"></i>жҜҸж—Ҙ</button>
  <button class="nav-btn" onclick="switchPage('defect',this)"><i class="ti ti-alert-triangle"></i>зјәеӨұ</button>
  <button class="nav-btn" onclick="switchPage('settings',this)"><i class="ti ti-settings"></i>иЁӯе®ҡ</button>
</nav>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-title" id="modal-title"></div>
    <div id="modal-body"></div>
    <div class="modal-btns" id="modal-btns"></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const FLOORS={
  '2F':['201','203','205','206','207','208','209','210','211','212','213'],
  '3F':['301','303','305','306','307','308','309','310','311','312','313'],
  '5F':['501','502','503','505','506','507','508','509','510','511','512','513'],
  '6F':['601','602','603','605','606','607','608','609','610','611','612','613'],

const GAS_URL='https://script.google.com/macros/s/AKfycbyF22pTeYz_2MxxsYePCbNnEaWlBMMPkjf1eydI4et4PV0_wnUsOuboEBUDEpBN2OTM/exec';
let _saving=false,_dirty=false,_saveTimer=null;

function save(){
  try{localStorage.setItem('hk2',JSON.stringify(S));}catch(e){}
  _dirty=true;
  clearTimeout(_saveTimer);
  _saveTimer=setTimeout(()=>syncToSheet(),1500);
}

function syncToSheet(){
  if(_saving){_dirty=true;return;}
  _saving=true;_dirty=false;
  showSyncStatus('saving');
  fetch(GAS_URL,{method:'POST',body:JSON.stringify({action:'save',payload:S})})
    .then(r=>r.json())
    .then(d=>{
      _saving=false;
      if(d.ok){showSyncStatus('ok');}
      else{showSyncStatus('err');}
      if(_dirty)syncToSheet();
    })
    .catch(err=>{_saving=false;showSyncStatus('err');});
}

function load(){
  try{const d=localStorage.getItem('hk2');if(d)Object.assign(S,JSON.parse(d));}catch(e){}
}

async function loadFromSheet(){
  showSyncStatus('loading');
  try{
    const r=await fetch(GAS_URL,{method:'POST',body:JSON.stringify({action:'load'})});
    const d=await r.json();
    if(d.ok&&d.data&&d.data!=='{}'){
      const remote=JSON.parse(d.data);
      Object.assign(S,remote);
      try{localStorage.setItem('hk2',JSON.stringify(S));}catch(e){}
    }
    showSyncStatus('ok');
    initMonth();
    document.getElementById('cycle-label').textContent=getCycleLabel();
    renderDash();
  }catch(err){
    showSyncStatus('err');
    console.error(err);
    initMonth();
    document.getElementById('cycle-label').textContent=getCycleLabel();
    renderDash();
  }
}

function showSyncStatus(state){

  else if(state==='saving'){el.innerHTML='<i class="ti ti-cloud-upload"></i> е„Іеӯҳдёӯ...';el.style.color='var(--text3)';}

// в”Җв”Җ SCORES в”Җв”Җ
function calcScores(){
  const k=getK();
  const sc={},rooms={},coRooms={},sweptRooms={},maintSc={},workSc={},roomBonusSc={},roomBonusCnt={};
  S.staff.forEach(s=>{sc[s.name]=0;rooms[s.name]=0;coRooms[s.name]=0;sweptRooms[s.name]=0;maintSc[s.name]=0;workSc[s.name]=0;roomBonusSc[s.name]=0;roomBonusCnt[s.name]=0;});
  Object.values(S.maint[k]||{}).forEach(v=>{
    if(!v)return;
    v.by.split('гҖҒ').forEach(n=>{if(sc[n]!==undefined){sc[n]+=2;maintSc[n]+=2;}});
  });
  Object.values(S.daily[k]||{}).forEach(day=>{
    (day.tasks||[]).forEach(t=>{
      const task=TASKS.find(dt=>dt.id===t.id);
      if(!task||!t.names||!t.names.length)return;
      if(task.id==='inspect'||task.id==='co12'||task.id==='co34'){
        t.names.forEach(n=>{
          if(n==='ж«ғеҸ°')return;
          if(task.id==='inspect'&&rooms[n]!==undefined) rooms[n]+=(t.num||0);
          if((task.id==='co12'||task.id==='co34')&&coRooms[n]!==undefined) coRooms[n]+=(t.num||0);
          const s=S.staff.find(s=>s.name===n);
          if(!s||s.type==='pt')return;
          if(s.type==='full'&&task.id!=='inspect'){sc[n]+=task.score*(t.num||0);workSc[n]+=task.score*(t.num||0);}
          if(s.type==='full'&&task.id==='inspect'){sc[n]+=(t.num||0);workSc[n]+=(t.num||0);}
        });return;
      }
      const base=task.perUnit?task.score*(t.num||1):task.score;
      const fullCount=task.multi?t.names.filter(n=>S.staff.find(s=>s.name===n&&s.type==='full')).length:1;
      const per=task.multi?base/Math.max(fullCount,1):base;
      t.names.forEach(n=>{
        const s=S.staff.find(s=>s.name===n);
        if(!s||s.type==='pt')return;
        sc[n]+=per;workSc[n]+=per;
      });
    });
  });
  // еҜҰйҡӣжҺғжҲҝй–“ж•ёпјҲеҫһ roomMap зөұиЁҲжҜҸдәәиІ иІ¬е№ҫй–“пјү
  Object.values(S.daily[k]||{}).forEach(day=>{
    const roomMap=day.roomMap||{};
    Object.values(roomMap).forEach(val=>{
      const names=Array.isArray(val)?val:[val];
      names.forEach(n=>{
        if(sweptRooms[n]!==undefined) sweptRooms[n]+=1;
      });
    });
  });

  // дёү/еӣӣдәәжҲҝеҠ еҲҶ
  Object.values(S.daily[k]||{}).forEach(day=>{
    const roomMap=day.roomMap||{};
    Object.entries(roomMap).forEach(([room,val])=>{
      const bonus=BONUS_ROOMS[room]||0;
      if(!bonus)return;
      const names=Array.isArray(val)?val:[val];
      names.forEach(n=>{
        const s=S.staff.find(s=>s.name===n);
        if(!s||s.type==='pt')return;
        sc[n]+=bonus;workSc[n]+=bonus;
        roomBonusSc[n]+=bonus;roomBonusCnt[n]+=1;
      });
    });
  });

  // bonus
  const bonuses=S.bonuses[k]||{};
  S.staff.filter(s=>s.type==='full').forEach(s=>{
    const b=parseFloat(bonuses[s.name])||0;
    sc[s.name]+=b;
  });
  // defect deduct
  S.staff.filter(s=>s.type==='full').forEach(s=>{
    const d=Math.floor((S.defectCounts[s.name]||0)/5);
    sc[s.name]-=d;
  });
  return {sc,rooms,coRooms,sweptRooms,maintSc,workSc,roomBonusSc,roomBonusCnt};
}

function saveBonus(name){

// в”Җв”Җ MAINT в”Җв”Җ
function parseMaintDate(el){
  const val=el.value.replace(/\D/g,'');
  const display=document.getElementById('maint-date-display');
  if(val.length===4){
    // MMDD ж јејҸ
    const mm=val.slice(0,2),dd=val.slice(2,4);
    const yr=new Date().getFullYear();
    const dateStr=`${yr}-${mm}-${dd}`;
    el.dataset.parsed=dateStr;
    display.textContent=`вҶ’ ${yr}/${mm}/${dd}`;
  } else if(val.length===8){
    // YYYYMMDD
    const dateStr=`${val.slice(0,4)}-${val.slice(4,6)}-${val.slice(6,8)}`;
    el.dataset.parsed=dateStr;
    display.textContent=`вҶ’ ${val.slice(0,4)}/${val.slice(4,6)}/${val.slice(6,8)}`;
  } else {
    el.dataset.parsed='';
    display.textContent='';
  }
}

function getMaintDate(){
  const el=document.getElementById('maint-date');
  // е…ҲзңӢжңүжІ’жңүи§ЈжһҗйҒҺзҡ„ж—Ҙжңҹ
  if(el&&el.dataset.parsed) return el.dataset.parsed;
  // жІ’жңүе°ұеӣһеӮід»ҠеӨ©
  return new Date().toISOString().slice(0,10);
}

    }).join('');

    } else {
      statusTxt=hasSaved?`е·Іе„Іеӯҳпјҡ${sv.names.join('гҖҒ')}${sv.num>0?' Г—'+sv.num:''}`:'е°ҡжңӘе„Іеӯҳ';

function markDirty(taskId){
  if(taskId==='co12'||taskId==='co34') return; // е…Ёй…Қж¬„дҪҚе®Ңе…ЁжүӢеӢ•пјҢдёҚи§ёзҷји®ҠжӣҙжҸҗзӨә
  const ti=document.getElementById('ti-'+taskId);
  const ts=document.getElementById('ts-'+taskId);
  if(ti){ti.classList.remove('saved');ti.classList.add('dirty');}
  if(ts){ts.textContent='жңүи®ҠжӣҙпјҢи«Ӣе„Іеӯҳ';ts.className='task-status is-dirty';}
}

function saveTask(taskId){
  const date=document.getElementById('daily-date').value;
  if(!date){toast('и«Ӣе…ҲйҒёж—Ҙжңҹ');return;}
  const k=getK();
  if(!S.daily[k])S.daily[k]={};
  if(!S.daily[k][date])S.daily[k][date]={tasks:[],extra:''};
  const names=[...document.querySelectorAll(`#chips-${taskId} .chip.on`)].map(c=>c.textContent);
  const numEl=document.getElementById('num-'+taskId);
  const num=numEl?parseInt(numEl.value)||0:1;
  const tasks=S.daily[k][date].tasks||[];
  const multiEntry=['inspect','co12','co34'].includes(taskId);
  if(multiEntry){
    // еӨҡзӯҶжЁЎејҸпјҡеҗҢдёҖдәәе·ІеӯҳеңЁеүҮжӣҙж–°пјҢеҗҰеүҮж–°еўһ
    if(names.length===1){
      const existIdx=tasks.findIndex(t=>t.id===taskId&&t.names&&t.names[0]===names[0]);
      if(existIdx>=0) tasks[existIdx]={id:taskId,names,num};
      else tasks.push({id:taskId,names,num});
    } else if(names.length===0){
      // жІ’йҒёдәәдёҚеҒҡд»»дҪ•дәӢ
    } else {
      // еӨҡдәәеҗҢжҷӮйҒёпјҡз•¶жҲҗдёҖзӯҶ
      tasks.push({id:taskId,names,num});
    }
  } else {
    // е…¶д»–й …зӣ®пјҡеҗҢ taskId иҰҶи“Ӣ
    const singleIdx=tasks.findIndex(t=>t.id===taskId);
    if(singleIdx>=0) tasks[singleIdx]={id:taskId,names,num};
    else tasks.push({id:taskId,names,num});
  }
  S.daily[k][date].tasks=tasks;
  // also store roomMap for inspect task
  if(taskId==='inspect'&&window._parsed){
    if(!S.daily[k][date].roomMap)S.daily[k][date].roomMap={};
    window._parsed.forEach(r=>{
      if(!r.rooms||!r.rooms.length)return;
      const rNames=r.names||[r.name];
      // roomMap еӯҳеҺҹе§ӢеҗҚеӯ—пјҲеҢ…еҗ«еӨ–йғЁж”ҜжҸҙпјү
      if(!rNames.length)return;
      r.rooms.forEach(room=>{
        S.daily[k][date].roomMap[room]=rNames.length===1?rNames[0]:rNames;
      });
    });
  }
  save();
  const ti=document.getElementById('ti-'+taskId);
  const ts=document.getElementById('ts-'+taskId);
  const task2=TASKS.find(t=>t.id===taskId);
  const hasSaved=names.length>0;
  if(ti){ti.classList.remove('dirty');ti.classList.toggle('saved',hasSaved);}
  if(ts){
    if(hasSaved){
      const numLabel=task2&&task2.perUnit&&num>0?` Г—${num}й–“`:'';
      ts.textContent=`е·Іе„Іеӯҳпјҡ${names.join('гҖҒ')}${numLabel}`;
      ts.className='task-status is-saved';
    } else {
      ts.textContent='е°ҡжңӘе„Іеӯҳ';
      ts.className='task-status';
    }
  }
  // еӨҡзӯҶй …зӣ®е„ІеӯҳеҫҢйҮҚж–°жёІжҹ“пјҲйЎҜзӨәе·ІеӯҳеҲ—иЎЁпјү
  if(['inspect','co12','co34'].includes(taskId)){
    renderDailyTasks(true);
    const k2=getK();
    const rm=(S.daily[k2]&&S.daily[k2][date]&&S.daily[k2][date].roomMap)||{};
    const bonusRooms=taskId==='inspect'?Object.keys(rm).filter(r=>BONUS_ROOMS[r]):[];
    if(bonusRooms.length>0){
      const bonusPts=bonusRooms.reduce((a,r)=>a+BONUS_ROOMS[r],0);
      toast(`${task2?.label} е·Іж–°еўһ вңҰ еҗ« ${bonusRooms.length} й–“еҠ еҲҶжҲҝ +${bonusPts}еҲҶ`);
    } else {
      toast(`${task2?.label} е·Іж–°еўһ`);
    }
  } else {
    toast(`${task2?.label} е·Іе„Іеӯҳ`);
  }
}

function removeTaskEntry(taskId,entryIndex){
  const date=document.getElementById('daily-date').value;
  if(!date)return;
  const k=getK();
  if(!S.daily[k]||!S.daily[k][date])return;
  const tasks=S.daily[k][date].tasks||[];
  // жүҫеҲ°з¬¬ entryIndex зӯҶи©І taskId зҡ„зҙҖйҢ„
  let count=0;
  const idx=tasks.findIndex(t=>{
    if(t.id!==taskId)return false;
    if(count===entryIndex){count++;return true;}
    count++;return false;
  });
  if(idx>=0) tasks.splice(idx,1);
  save();
  // йҮҚж–°жёІжҹ“и©Ій Ғ
  const saved=(S.daily[k]||{})[date]||{tasks:[],extra:''};
  renderDailyTasks(true);
  toast('е·ІеҲӘйҷӨ');
}

function clearTask(taskId){
  const date=document.getElementById('daily-date').value;
  if(!date)return;
  document.querySelectorAll(`#chips-${taskId} .chip`).forEach(c=>c.classList.remove('on'));
  const numEl=document.getElementById('num-'+taskId);
  if(numEl)numEl.value=0;
  const k=getK();
  if(S.daily[k]&&S.daily[k][date]){
    const tasks=S.daily[k][date].tasks||[];
    const idx=tasks.findIndex(t=>t.id===taskId);
    if(idx>=0)tasks.splice(idx,1);
  }
  save();
  const ti=document.getElementById('ti-'+taskId);
  const ts=document.getElementById('ts-'+taskId);
  if(ti){ti.classList.remove('saved','dirty');}
  if(ts){ts.textContent='е·Іжё…йҷӨ';ts.className='task-status';}
  toast(`${TASKS.find(t=>t.id===taskId)?.label} е·Іжё…йҷӨ`);
}

function saveExtra(){
  const date=document.getElementById('daily-date').value;
  if(!date){toast('и«Ӣе…ҲйҒёж—Ҙжңҹ');return;}
  const k=getK();

// Journal parser
function parseJournal(){
  const text=document.getElementById('journal-text').value.trim();
  if(!text){toast('и«ӢиІјдёҠж—ҘиӘҢж–Үеӯ—');return;}

  // еҫһз¬¬дёҖиЎҢиҮӘеӢ•жҠ“ж—ҘжңҹпјҲдҫӢпјҡ0527ж•ҙжҲҝж—ҘиӘҢ вҶ’ з•¶е№ҙ5/27пјү
  const dateMatch=text.match(/(\d{2})(\d{2})\s*ж•ҙжҲҝж—ҘиӘҢ/);
  if(dateMatch){
    const mm=dateMatch[1].padStart(2,'0');
    const dd=dateMatch[2].padStart(2,'0');
    // еҲӨж–·е№ҙд»Ҫпјҡз”Ёзӣ®еүҚзі»зөұе№ҙд»ҪпјҢиӢҘжңҲд»ҪжҜ”з•¶еүҚжңҲд»ҪеӨ§еҫҲеӨҡеүҮеҸ–еүҚдёҖе№ҙ
    const now=new Date();
    let yr=now.getFullYear();
    const mon=parseInt(mm);
    if(mon>now.getMonth()+3) yr--; // и·Ёе№ҙдҝқиӯ·
    const dateStr=`${yr}-${mm}-${dd}`;
    const dateEl=document.getElementById('daily-date');
    if(dateEl&&dateEl.value!==dateStr){
      dateEl.value=dateStr;
      renderDailyTasks(true); // еҲҮжҸӣеҲ°и©Іж—ҘжңҹпјҢдҝқз•ҷи§ЈжһҗиіҮж–ҷ
    }
  }

  // и§ЈжһҗйҖҖжҲҝй–“ж•ё
  let checkoutTotal=0;
  const coMatch=text.match(/йҖҖжҲҝй–“ж•ё[пјҡ:]\s*(\d+)/);
  if(coMatch) checkoutTotal=parseInt(coMatch[1]);

  // и§ЈжһҗжҹҘжҲҝе–®дҪҚпјҲеҸҜд»ҘжҳҜгҖҢж«ғеҸ°/ж«ғжӘҜгҖҚжҲ–жҲҝеӢҷдәәе“ЎеҗҚеӯ—пјү
  let deskInspect=false;
  let inspectPerson=null; // дәәеҗҚжҹҘжҲҝ
  const inspectUnitMatch=text.match(/жҹҘжҲҝе–®дҪҚ[пјҡ:]\s*(.+)/);
  if(inspectUnitMatch){
    const unit=inspectUnitMatch[1].trim();
    if(/^(ж«ғеҸ°|ж«ғжӘҜ|front|desk)/i.test(unit)){
      deskInspect=true;
    } else if(/^[\u4e00-\u9fa5]{1,4}$/.test(unit)){
      inspectPerson=unit; // жҲҝеӢҷдәәе“ЎжҹҘжҲҝ
    }
  }

  // и§ЈжһҗжҜҸеҖӢдәәжҺғжҲҝ
  const results=[];
  let cur=null,curRooms=[];

  let curNote='';
  text.split('\n').forEach(line=>{
    const trimmed=line.trim();
    if(!trimmed) return;

    // и·ійҒҺжЁҷйЎҢиЎҢ
    if(/ж•ҙжҲҝж—ҘиӘҢ/.test(trimmed)) return;
    if(/^(йҖҖжҲҝй–“ж•ё|жҹҘжҲҝе–®дҪҚ)[пјҡ:]/.test(trimmed)) return;

    // е§“еҗҚпјҲж”ҜжҸҙеӨҡдәә вһ•+& еҲҶйҡ”пјүпјҡNй–“
    const nameMatch=trimmed.match(/^([дёҖ-йҫҘa-zA-Zвһ•\+&гҖҒпјҢ,\s]{1,20})\s*[пјҡ:]\s*(\d+)\s*й–“/);
    if(nameMatch){
      if(cur) results.push({names:curNames,count:curRooms.length,rooms:[...curRooms],note:curNote.trim()});
      const rawNames=nameMatch[1];
      curNames=rawNames.split(/[вһ•\+&гҖҒпјҢ,\s]+/).map(n=>n.trim()).filter(n=>/[дёҖ-йҫҘa-zA-Z]/.test(n));
      cur=rawNames;
      curRooms=[];
      curNote='';
      return;
    }

    if(cur){
      // жҲҝиҷҹиЎҢ
      const ns=trimmed.match(/\d{3}/g);
      if(ns){ curRooms.push(...ns); return; }
      // еӮҷиЁ»иЎҢпјҲдёҚз®ЎжңүжІ’жңүвҡ пёҸпјҢжңүжҲҝиҷҹд»ҘеӨ–зҡ„ж–Үеӯ—е°ұжҳҜеӮҷиЁ»пјү
      const noteText=trimmed.replace(/^вҡ пёҸ\s*/,'').trim();
      if(noteText) curNote+=' '+noteText;
    }
  });

  if(cur) results.push({names:curNames||[cur],count:curRooms.length,rooms:[...curRooms],note:curNote.trim()});

  if(!results.length&&!checkoutTotal&&!deskInspect){toast('и§ЈжһҗеӨұж•—пјҢи«ӢзўәиӘҚж јејҸ');return;}

  window._parsed=results;
  window._parsedCheckout=checkoutTotal;
  window._parsedDeskInspect=deskInspect;
  window._parsedInspectPerson=inspectPerson;

  // йЎҜзӨәзөҗжһң
  let html=`<div class="parsed-box">`;
  if(checkoutTotal>0) html+=`<div style="padding:4px 0;border-bottom:1px solid var(--border);font-size:12px;color:var(--teal)">вң“ йҖҖжҲҝй–“ж•ёпјҡ${checkoutTotal} й–“</div>`;
  if(deskInspect) html+=`<div style="padding:4px 0;border-bottom:1px solid var(--border);font-size:12px;color:var(--orange)">вң“ жҹҘжҲҝе–®дҪҚпјҡж«ғеҸ°</div>`;
  if(inspectPerson) html+=`<div style="padding:4px 0;border-bottom:1px solid var(--border);font-size:12px;color:var(--teal)">вң“ жҹҘжҲҝе–®дҪҚпјҡ${inspectPerson}пјҲжҲҝеӢҷдәәе“Ўпјү</div>`;
  if(results.length){
    html+=`<div style="font-size:12px;font-weight:600;margin:6px 0 4px">жҺғжҲҝдәәе“Ў</div>`;
    results.forEach(r=>{
      const rNames=r.names||[r.name];
      const matched=rNames.map(n=>S.staff.find(s=>s.name===n||n.includes(s.name)||s.name.includes(n))).filter(Boolean);
      const note=r.note?` <span style="color:var(--text3)">${r.note.trim()}</span>`:'';
      const matchTxt=matched.length?'<span style="color:var(--teal)">вң“ '+matched.map(s=>s.name).join('гҖҒ')+'</span>':'<span style="color:var(--danger)">вҡ  жңӘжүҫеҲ°</span>';
      html+=`<div style="padding:4px 0;border-bottom:1px solid var(--border);font-size:12px">${rNames.join('вһ•')}пјҡ${r.count}й–“${note} ${matchTxt}</div>`;
    });
  }
  html+=`<button class="btn" style="width:100%;margin-top:8px;font-size:11px;color:var(--text2)" onclick="applyParsed()">йҮҚж–°еҘ—з”Ё</button></div>`;
  document.getElementById('parse-result').innerHTML=html;
  // и§Јжһҗе®Ңз«ӢеҚіеӯҳ roomMapпјҲдёҚзӯүеҘ—з”ЁжҲ–е„ІеӯҳжҹҘжҲҝпјү
  const _date=document.getElementById('daily-date').value;
  if(_date&&results.length){
    const _k=getK();
    if(!S.daily[_k])S.daily[_k]={};
    if(!S.daily[_k][_date])S.daily[_k][_date]={tasks:[],extra:''};
    if(!S.daily[_k][_date].roomMap)S.daily[_k][_date].roomMap={};
    results.forEach(r=>{
      if(!r.rooms||!r.rooms.length)return;
      const rNames=r.names||[r.name];
      // roomMap еӯҳеҺҹе§ӢеҗҚеӯ—пјҲеҢ…еҗ«еӨ–йғЁж”ҜжҸҙпјү
      if(!rNames.length)return;
      r.rooms.forEach(room=>{
        S.daily[_k][_date].roomMap[room]=rNames.length===1?rNames[0]:rNames;
      });
    });
    save();
  }
  // иҮӘеӢ•еҘ—з”ЁпјҲзӯү DOM жӣҙж–°еҫҢпјү
  setTimeout(()=>applyParsed(),50);
}

function applyParsed(){
  const date=document.getElementById('daily-date').value;

  // еӯҳжҲҝиҷҹе°ҚжҮүдәәеҗҚпјҲдҫӣзјәеӨұжҹҘи©ўпјү
  if(date&&window._parsed){
    const k=getK();
    if(!S.daily[k])S.daily[k]={};
    if(!S.daily[k][date])S.daily[k][date]={tasks:[],extra:''};
    if(!S.daily[k][date].roomMap)S.daily[k][date].roomMap={};
    window._parsed.forEach(r=>{
      if(!r.rooms||!r.rooms.length)return;
      const rNames=r.names||[r.name];
      // roomMap еӯҳеҺҹе§ӢеҗҚеӯ—пјҲеҢ…еҗ«еӨ–йғЁж”ҜжҸҙпјҢдёҚйҒҺжҝҫе“Ўе·ҘеҗҚе–®пјү
      if(!rNames.length)return;
      r.rooms.forEach(room=>{
        S.daily[k][date].roomMap[room]=rNames.length===1?rNames[0]:rNames;
      });
    });
    save();
  }

  // в”Җв”Җ еӮҷиЁ»й—ңйҚөеӯ— вҶ’ е·ҘдҪңй …зӣ®е°ҚжҮүиЎЁпјҲй•·зҡ„е„Әе…ҲпјҢйҒҝе…ҚгҖҢе…¬жё…гҖҚеҢ№й…ҚеҲ°гҖҢж—©дёҠе…¬жё…гҖҚпјүв”Җв”Җ
  const NOTE_MAP=[
    {key:'ж—©дёҠе…¬жё…', taskId:'am_clean'},
    {key:'ж—©е…¬жё…',   taskId:'am_clean'},
    {key:'еҗҰеҸёи„«',   taskId:'linen'},
    {key:'е…¬жё…',     taskId:'pm_clean'},  // ж”ҫжңҖеҫҢпјҢйҒҝе…Қиў«ж—©дёҠе…¬жё…иӘӨи§ёзҷј
  ];
  // е…Ҳе»әз«ӢжҜҸеҖӢ taskId е°ҚжҮүзҡ„дәәеҗҚеҲ—иЎЁ
  const noteTaskNames={};
  if(window._parsed){
    window._parsed.forEach(r=>{
      const rNames=r.names||[r.name];
      const matched=rNames.map(n=>S.staff.find(s=>s.name===n||n.includes(s.name)||s.name.includes(n))).filter(Boolean);
      if(!matched.length||!r.note)return;
      // жҠҠеӮҷиЁ»жӢҶжҲҗеӨҡиЎҢеҖӢеҲҘеҲӨж–·пјҢйҒҝе…Қи·ЁиЎҢиӘӨеҲӨ
      const noteLines=r.note.split(/\s+/);
      noteLines.forEach(noteLine=>{
        for(const {key,taskId} of NOTE_MAP){
          if(noteLine.includes(key)){
            if(!noteTaskNames[taskId])noteTaskNames[taskId]=[];
            // matched жҳҜйҷЈеҲ—пјҢжҜҸеҖӢдәәйғҪеҠ йҖІеҺ»
            matched.forEach(ms=>{
              if(!noteTaskNames[taskId].includes(ms.name))
                noteTaskNames[taskId].push(ms.name);
            });
            break;
          }
        }
      });
    });
  }

  // в”Җв”Җ еҘ—з”ЁжҹҘжҲҝ в”Җв”Җ
  const inspectChips=document.querySelectorAll('#chips-inspect .chip');
  inspectChips.forEach(c=>c.classList.remove('on'));
  if(window._parsedDeskInspect){
    inspectChips.forEach(c=>{if(c.textContent==='ж«ғеҸ°')c.classList.add('on');});
  } else if(window._parsedInspectPerson){
    // дәәеҗҚжҹҘжҲҝпјҡеҘ—з”Ёи©ІдәәеҗҚ
    inspectChips.forEach(c=>{if(c.textContent===window._parsedInspectPerson)c.classList.add('on');});
  } else if(window._parsed){
    window._parsed.forEach(r=>{
      const rNames=r.names||[r.name];
      rNames.forEach(rn=>{
        const matched=S.staff.find(s=>s.name===rn||rn.includes(s.name)||s.name.includes(rn));
        if(!matched)return;
        inspectChips.forEach(c=>{if(c.textContent===matched.name)c.classList.add('on');});
      });
    });
  }
  // жҹҘжҲҝй–“ж•ёпјҡеҸӘеңЁдәәеҗҚжҹҘжҲҝжҷӮеЎ«е…ҘпјҲжҜҸдәәжҺғзҡ„й–“ж•ёеҠ зёҪпјү
  if(!window._parsedDeskInspect&&!window._parsedInspectPerson){
    const inspectNum=document.getElementById('num-inspect');
    if(inspectNum&&window._parsed){
      const total=window._parsed.reduce((a,r)=>a+r.count,0);
      if(total>0) inspectNum.value=total;
    }
  }
  markDirty('inspect');

  // йҖҖжҲҝй–“ж•ёеҸӘйЎҜзӨәеңЁи§ЈжһҗзөҗжһңпјҢдёҚиҮӘеӢ•еЎ«е…Ҙе…Ёй…Қж¬„дҪҚпјҲе…Ёй…ҚйңҖжүӢеӢ•еЎ«пјү

  // в”Җв”Җ еҘ—з”ЁеӮҷиЁ»е·ҘдҪңй …зӣ® в”Җв”Җ
  Object.entries(noteTaskNames).forEach(([taskId,names])=>{
    const chips=document.querySelectorAll(`#chips-${taskId} .chip`);
    chips.forEach(c=>c.classList.remove('on'));
    names.forEach(name=>{
      chips.forEach(c=>{if(c.textContent===name)c.classList.add('on');});
    });
    markDirty(taskId);
  });

  toast('е·ІеҘ—з”ЁпјҒи«ӢзўәиӘҚеҗ„й …еҫҢжҢүгҖҢе„ІеӯҳгҖҚ');
}

// в”Җв”Җ DEFECT в”Җв”Җ
function renderDefect(){
  const fullStaff=S.staff.filter(s=>s.type==='full');
  let html='';
  fullStaff.forEach(s=>{
    const cnt=S.defectCounts[s.name]||0;
    const q=Math.floor(cnt/5);
    html+=`<div class="def-row">
      <div><div style="font-weight:600">${s.name}</div>${q>0?`<div style="font-size:11px;color:var(--danger)">е“ҒиіӘжүЈ ${q} еҲҶ</div>`:''}</div>
      <div class="def-ctrls">
        <button class="def-btn" onclick="adjDef('${s.name}',-1)">вҲ’</button>
        <div class="def-count">${cnt}</div>
        <button class="def-btn" onclick="adjDef('${s.name}',1)">+</button>
      </div>
    </div>`;
  });
  document.getElementById('defect-summary').innerHTML=html;
  const chips=document.getElementById('defect-chips');
  if(chips)chips.innerHTML=fullStaff.map(s=>`<div class="chip" onclick="pickOne(this)">${s.name}</div>`).join('');
  if(!document.getElementById('defect-date').value)
    document.getElementById('defect-date').value=new Date().toISOString().slice(0,10);
  renderDefectList();
}
function adjDef(name,d){
  S.defectCounts[name]=(S.defectCounts[name]||0)+d;
  if(S.defectCounts[name]<0)S.defectCounts[name]=0;
  save();renderDefect();
}
function lookupRoomOwner(room){
  if(!room||room.length<3)return null;
  const k=getK();
  const daily=S.daily[k]||{};
  const defDate=document.getElementById('defect-date').value;
  // е…Ҳжүҫз•¶еӨ©пјҢжүҫдёҚеҲ°еҶҚжүҫжңҖиҝ‘ж—ҘжңҹпјҲеҫҖеүҚжүҫпјҢдёҚеҫҖеҫҢжүҫпјү
  const allDates=Object.keys(daily).sort((a,b)=>b.localeCompare(a));
  // з•¶еӨ©е„Әе…Ҳ
  if(defDate){
    const rm=(daily[defDate]||{}).roomMap||{};
    if(rm[room]){
      const names=Array.isArray(rm[room])?rm[room]:[rm[room]];
      return{names,date:defDate,exact:true};
    }
  }
  // еҫҖеүҚжүҫжңҖиҝ‘дёҖеӨ©пјҲдёҚи¶…йҒҺзјәеӨұж—Ҙжңҹпјү
  for(const date of allDates){
    if(defDate&&date>defDate) continue; // дёҚжүҫжңӘдҫҶзҡ„зҙҖйҢ„
    const rm=(daily[date]||{}).roomMap||{};
    if(rm[room]){
      const names=Array.isArray(rm[room])?rm[room]:[rm[room]];
      return{names,date,exact:false};
    }
  }
  return null;
}
function onDefectRoomInput(){
  const room=document.getElementById('defect-room').value.trim();
  const hint=document.getElementById('defect-room-hint');
  if(!hint)return;
  if(room.length>=3){
    const found=lookupRoomOwner(room);
    if(found){
      // еҚҖеҲҶеңЁиҒ·е“Ўе·Ҙе’ҢеӨ–йғЁж”ҜжҸҙ
      const knownNames=found.names.filter(n=>S.staff.find(s=>s.name===n));
      const unknownNames=found.names.filter(n=>!S.staff.find(s=>s.name===n));
      const knownStr=knownNames.join('гҖҒ');
      const unknownStr=unknownNames.length?` <span style="color:var(--text2)">пјӢ${unknownNames.join('гҖҒ')}пјҲеӨ–йғЁж”ҜжҸҙпјү</span>`:'';
      const dateNote=found.exact?'з•¶еӨ©':'жңҖиҝ‘дёҖзӯҶ '+found.date;
      const multiNote=found.names.length>1?' <span style="font-size:10px;color:var(--text3)">пјҲеӨҡдәәе…ұжҺғпјҢи«ӢжүӢеӢ•зўәиӘҚпјү</span>':'';
      hint.innerHTML=`<span style="color:var(--teal)">вң“ ${dateNote}пјҡ<b>${knownStr}</b>${unknownStr}</span>${multiNote}`;
      // иҮӘеӢ•йҒёз¬¬дёҖеҖӢеңЁиҒ·е“Ўе·Ҙ
      const firstKnown=knownNames[0];
      document.querySelectorAll('#defect-chips .chip').forEach(c=>{
        c.classList.toggle('on',c.textContent===firstKnown);
      });
    } else {
      hint.innerHTML=`<span style="color:var(--text3)">жҹҘз„ЎжӯӨжҲҝиҷҹзҡ„жҺғжҲҝзҙҖйҢ„пјҢи«ӢжүӢеӢ•йҒёиІ иІ¬дәә</span>`;
      document.querySelectorAll('#defect-chips .chip').forEach(c=>c.classList.remove('on'));
    }
  } else {
    hint.innerHTML='';
  }
}
function addDefect(){
  const date=document.getElementById('defect-date').value;
  const room=document.getElementById('defect-room').value.trim();
  const note=document.getElementById('defect-note').value.trim();
  const name=[...document.querySelectorAll('#defect-chips .chip.on')].map(c=>c.textContent)[0];
  if(!date||!room||!name){toast('и«ӢеЎ«ж—ҘжңҹгҖҒжҲҝиҷҹдёҰйҒёиІ иІ¬дәә');return;}
  S.defects.push({date,room,name,note});
  adjDef(name,1);
  document.getElementById('defect-room').value='';
  document.getElementById('defect-note').value='';
  const hint=document.getElementById('defect-room-hint');

  document.querySelectorAll('#defect-chips .chip').forEach(c=>c.classList.remove('on'));

}
function renderDefectList(){
  const total=S.defects.length;
  const list=S.defects.map((d,i)=>({...d,_i:i})).reverse();
  document.getElementById('defect-list').innerHTML=list.length?
    list.map(d=>`<div class="log-item" style="margin-top:8px;display:flex;align-items:flex-start;gap:8px">
      <div style="flex:1">
        <div class="log-date">${d.date} жҲҝиҷҹ ${d.room}</div>

      <button onclick="deleteDefect(${d._i})" style="flex-shrink:0;padding:4px 8px;border:1px solid var(--danger-border);background:var(--danger-bg);color:var(--danger);border-radius:var(--rs);font-size:11px;cursor:pointer">еҲӘйҷӨ</button>
    </div>`).join(''):
    '<div class="empty" style="padding:16px 0"><i class="ti ti-check"></i>жҡ«з„ЎзјәеӨұзҙҖйҢ„</div>';

function deleteDefect(i){
  const d=S.defects[i];
  if(!d)return;
  if(!confirm(`зўәе®ҡеҲӘйҷӨпјҹ\n${d.date} жҲҝиҷҹ${d.room} ${d.name}`))return;
  // йӮ„еҺҹзјәеӨұиЁҲж•ё
  if(S.defectCounts[d.name]>0) S.defectCounts[d.name]--;
  S.defects.splice(i,1);
  save();renderDefect();toast('е·ІеҲӘйҷӨзјәеӨұзҙҖйҢ„');
}

// в”Җв”Җ EXPORT в”Җв”Җ
function exportDailyScore(){
  const k=getK();
  const pm=S.month===1?12:S.month-1,py=S.month===1?S.year-1:S.year;

  // дәәе“ЎжҺ’еәҸпјҡеӣәе®ҡй ҶеәҸе„Әе…ҲпјҢе…¶д»–жӯЈиҒ·жҺҘи‘—пјҢPTжңҖеҫҢ
  const fixedOrder=['и© зҗӘ','йғҒеәӯ','з§Җиҳӯ','ж¬ЈиҠё'];
  const fullStaff=S.staff.filter(s=>s.type==='full');
  const ptStaff=S.staff.filter(s=>s.type==='pt');
  const orderedFull=[
    ...fixedOrder.map(n=>fullStaff.find(s=>s.name===n)).filter(Boolean),
    ...fullStaff.filter(s=>!fixedOrder.includes(s.name))
  ];
  const allStaff=[...orderedFull,...ptStaff];

  // иЁҲз®—жҜҸеӨ©жҜҸдәәеҫ—еҲҶ
  const daily=S.daily[k]||{};
  const dates=Object.keys(daily).sort();
  const maint=S.maint[k]||{};

  // дҝқйӨҠеҲҶпјҡжҢүж—ҘжңҹеҲҶй…ҚпјҲз”Ёе®ҢжҲҗж—Ҙжңҹпјү
  const maintByDate={};
  Object.values(maint).forEach(v=>{
    if(!v)return;
    if(!maintByDate[v.date])maintByDate[v.date]={};
    v.by.split('гҖҒ').forEach(n=>{
      maintByDate[v.date][n]=(maintByDate[v.date][n]||0)+2;
    });
  });

  // е»әз«ӢжҜҸж—Ҙеҫ—еҲҶиЎЁ
  const scoreByDate={};
  dates.forEach(date=>{
    scoreByDate[date]={};
    const day=daily[date]||{};
    (day.tasks||[]).forEach(t=>{
      const task=TASKS.find(dt=>dt.id===t.id);
      if(!task||!t.names||!t.names.length)return;
      // еҸӘиЁҲжӯЈиҒ·гҖҒи·ійҒҺж«ғеҸ°
      const scorable=t.names.filter(n=>n!=='ж«ғеҸ°'&&S.staff.find(s=>s.name===n&&s.type==='full'));
      if(!scorable.length)return;
      let pts=0;
      if(task.perUnit) pts=task.score*(t.num||0);
      else pts=task.score;
      const per=task.multi?pts/scorable.length:pts;
      scorable.forEach(n=>{
        scoreByDate[date][n]=(scoreByDate[date][n]||0)+per;
      });
    });
    // еҠ дҝқйӨҠеҲҶ
    if(maintByDate[date]){
      Object.entries(maintByDate[date]).forEach(([n,pts])=>{
        scoreByDate[date][n]=(scoreByDate[date][n]||0)+pts;
      });
    }
  });

  // зө„ CSV
  let csv=`п»ҝи·ҜеўғиЎҢж—… жҜҸж—ҘиЁҲеҲҶиЎЁ,${py}/${pm}/26 пҪһ ${S.year}/${S.month}/25
`;

  // иЎЁй ӯ
  csv+=`ж—Ҙжңҹ,${allStaff.map(s=>s.name).join(',')}
`;

  // жҜҸж—ҘдёҖиЎҢ
  let totals={};
  allStaff.forEach(s=>totals[s.name]=0);

  dates.forEach(date=>{
    const cols=allStaff.map(s=>{
      if(s.type==='pt') return 'вҖ”';
      const pts=Math.round(((scoreByDate[date]||{})[s.name]||0)*10)/10;
      totals[s.name]+=pts;
      return pts||0;
    });
    csv+=`${date},${cols.join(',')}
`;
  });

  // еҗҲиЁҲиЎҢ
  const totalCols=allStaff.map(s=>s.type==='pt'?'вҖ”':Math.round(totals[s.name]*10)/10);
  csv+=`жң¬жңҹеҗҲиЁҲ,${totalCols.join(',')}
`;

  // жҜҸж—Ҙжү“жҺғй–“ж•ёпјҲдәәеҗҚеңЁе·ҰпјҢж—ҘжңҹеҫҖеҸіпјү
  csv+=`
жү“жҺғй–“ж•ё
`;
  csv+=`дәәеҗҚ,${dates.join(',')},жң¬жңҹеҗҲиЁҲ
`;
  allStaff.forEach(s=>{
    const rowDates=dates.map(date=>{
      const d=daily[date]||{};
      const roomMap=d.roomMap||{};
      let cnt=0;
      Object.values(roomMap).forEach(val=>{
        const names=Array.isArray(val)?val:[val];
        if(names.includes(s.name)) cnt++;
      });
      return cnt||0;
    });
    const total=rowDates.reduce((a,v)=>a+v,0);
    csv+=`${s.name},${rowDates.join(',')},${total}
`;
  });

  // жҜҸж—ҘдҝқйӨҠзҙҖйҢ„пјҲдәәеҗҚеңЁе·ҰпјҢж—ҘжңҹеҫҖеҸіпјү
  const maintEntries=Object.entries(S.maint[k]||{});
  if(maintEntries.length){
    // ж”¶йӣҶжүҖжңүдҝқйӨҠж—Ҙжңҹ
    const maintDates=[...new Set(maintEntries.map(([,v])=>v&&v.date).filter(Boolean))].sort();
    csv+=`\nдҝқйӨҠзҙҖйҢ„\n`;
    csv+=`дәәеҗҚ,${maintDates.join(',')},дҝқйӨҠж јж•ё,дҝқйӨҠеҲҶ\n`;
    allStaff.filter(s=>s.type==='full').forEach(s=>{
      const byDate={};
      let totalCells=0;
      maintEntries.forEach(([ck,v])=>{
        if(!v||!v.by.includes(s.name))return;
        const d=v.date;
        if(!byDate[d])byDate[d]=0;
        byDate[d]++;
        totalCells++;
      });
      const cols=maintDates.map(d=>byDate[d]||0);
      csv+=`${s.name},${cols.join(',')},${totalCells},${totalCells*2}\n`;
    });
  }

  dl(csv,`жҜҸж—ҘиЁҲеҲҶ_${py}${String(pm).padStart(2,'0')}.csv`);

  // зјәеӨұзҙҖйҢ„пјҡзҚЁз«Ӣ CSVпјҢж—ҘжңҹзӮәж¬„гҖҒдәәеҗҚзӮәеҲ—
  const cycleStart2=`${py}-${String(pm).padStart(2,'0')}-26`;
  const cycleEnd2=`${S.year}-${String(S.month).padStart(2,'0')}-25`;
  const defects=S.defects.filter(d=>d.date>=cycleStart2&&d.date<=cycleEnd2)
    .sort((a,b)=>a.date.localeCompare(b.date));

  if(defects.length){
    // ж”¶йӣҶжүҖжңүж—Ҙжңҹе’ҢдәәеҗҚ
    const defDates=[...new Set(defects.map(d=>d.date))].sort();
    const defNames=[...new Set(defects.map(d=>d.name))];

    // е»әз«Ӣ ж—ҘжңҹГ—дәәеҗҚ зҡ„жҲҝиҷҹеҲ—иЎЁ
    const defGrid={};
    defects.forEach(d=>{
      if(!defGrid[d.name])defGrid[d.name]={};
      if(!defGrid[d.name][d.date])defGrid[d.name][d.date]=[];
      defGrid[d.name][d.date].push(d.room+(d.note?'('+d.note+')':''));
    });

    let defCsv=`п»ҝи·ҜеўғиЎҢж—… зјәеӨұзҙҖйҢ„,${py}/${pm}/26 пҪһ ${S.year}/${S.month}/25
`;
    defCsv+=`дәәеҗҚ,${defDates.join(',')},зјәеӨұзёҪй»һ
`;
    defNames.forEach(name=>{
      const cols=defDates.map(date=>{
        const rooms=(defGrid[name]||{})[date]||[];
        return rooms.length?'"'+rooms.join(' ')+'"':'';
      });
      const total=defects.filter(d=>d.name===name).length;
      defCsv+=`${name},${cols.join(',')},${total}
`;
    });
    dl(defCsv,`зјәеӨұзҙҖйҢ„_${py}${String(pm).padStart(2,'0')}.csv`);
  }
}

function exportCSV(){
  const {sc,rooms,coRooms,sweptRooms,maintSc,workSc}=calcScores();
  const k=getK();
  const pm=S.month===1?12:S.month-1,py=S.month===1?S.year-1:S.year;
  let csv=`\uFEFFи·ҜеўғиЎҢж—… жҲҝеӢҷиЁҲеҲҶеҪҷзёҪ,${py}/${pm}/26 пҪһ ${S.year}/${S.month}/25\n`;
  csv+=`е§“еҗҚ,йЎһеһӢ,жү“жҺғй–“ж•ё,дҝқйӨҠеҲҶ,е·ҘдҪңеҲҶ,йӨЁй•·еҠ еҲҶ,зјәеӨұй»һ,е“ҒиіӘжүЈеҲҶ,зёҪеҲҶ\n`;
  S.staff.forEach(s=>{
    const total=Math.round((sc[s.name]||0)*10)/10;
    const rc=rooms[s.name]||0;
    const def=S.defectCounts[s.name]||0;
    const deduct=s.type==='full'?Math.floor(def/5):0;
    const bonus=parseFloat((S.bonuses[k]||{})[s.name])||0;
    csv+=`${s.name},${s.type==='pt'?'PT':'жӯЈиҒ·'},${rc},${Math.round((maintSc[s.name]||0)*10)/10},${Math.round((workSc[s.name]||0)*10)/10},${bonus},${def},${deduct},${s.type==='pt'?'вҖ”':total}\n`;
  });
  dl(csv,`жҲҝеӢҷиЁҲеҲҶ_${py}${String(pm).padStart(2,'0')}.csv`);
}
function exportDetailCSV(){
  const k=getK();
  const pm=S.month===1?12:S.month-1,py=S.month===1?S.year-1:S.year;
  let csv=`\uFEFFи·ҜеўғиЎҢж—… е·ҘдҪңжҳҺзҙ°,${py}/${pm}/26 пҪһ ${S.year}/${S.month}/25\n`;
  csv+=`ж—Ҙжңҹ,е·ҘдҪңй …зӣ®,иІ иІ¬дәә,ж•ёйҮҸ,жҜҸдәәеҫ—еҲҶ\n`;
  Object.entries(S.daily[k]||{}).sort().forEach(([date,day])=>{
    (day.tasks||[]).forEach(t=>{
      if(!t.names||!t.names.length)return;
      const task=TASKS.find(dt=>dt.id===t.id);if(!task)return;
      const base=task.perUnit?task.score*(t.num||1):task.score;
      const fullCnt=task.multi?t.names.filter(n=>S.staff.find(s=>s.name===n&&s.type==='full')).length:1;
      const per=task.multi?base/Math.max(fullCnt,1):base;
      csv+=`${date},${task.label},"${t.names.join('гҖҒ')}",${t.num||1},${Math.round(per*10)/10}\n`;
    });
    if(day.extra)csv+=`${date},йЎҚеӨ–й …зӣ®,,,${day.extra}\n`;
  });
  csv+=`\nдҝқйӨҠзҙҖйҢ„\nж—Ҙжңҹ,жЁ“еұӨ,жҲҝиҷҹ,й …зӣ®,иІ иІ¬дәә\n`;
  Object.entries(S.maint[k]||{}).forEach(([ck,v])=>{
    if(!v)return;const p=ck.split('|');
    csv+=`${v.date},${p[0]},${p[1]},${p[2]},${v.by}\n`;
  });
  csv+=`\nзјәеӨұзҙҖйҢ„\nж—Ҙжңҹ,жҲҝиҷҹ,иІ иІ¬дәә,иӘӘжҳҺ\n`;
  S.defects.forEach(d=>csv+=`${d.date},${d.room},${d.name},${d.note||''}\n`);
  dl(csv,`е·ҘдҪңжҳҺзҙ°_${py}${String(pm).padStart(2,'0')}.csv`);
}
function dl(csv,fn){
  const b=new Blob([csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=fn;a.click();toast('е·ІеҢҜеҮә '+fn);
}

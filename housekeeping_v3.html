<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>路境行旅 房務計分系統</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fff;--bg2:#f7f7f5;--bg3:#efefed;
  --text:#1a1a1a;--text2:#6b6b6b;--text3:#b0b0b0;
  --border:#e8e8e6;--border2:#d0d0ce;
  --primary:#1a1a1a;--pt:#fff;
  --teal:#007a6e;--teal-bg:#e6f4f2;--teal-text:#005a51;
  --gold:#c8960a;--gold-bg:#fdf6e3;--gold-text:#9a7200;
  --danger-bg:#fff0f0;--danger:#c00;--danger-border:#fcc;
  --success-bg:#f0fff4;--success:#0a6e2e;
  --orange:#e65c00;--orange-bg:#fff3e0;
  --r:10px;--rs:6px;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1c1c1e;--bg2:#2c2c2e;--bg3:#3a3a3c;
  --text:#f2f2f7;--text2:#aeaeb2;--text3:#636366;
  --border:#3a3a3c;--border2:#48484a;
  --primary:#f2f2f7;--pt:#1c1c1e;
  --teal-bg:#0d2e2b;--teal-text:#4ecdc4;
  --gold-bg:#2e2600;--gold-text:#f5c842;
  --orange-bg:#2e1800;
}}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;color:var(--text);background:var(--bg3);min-height:100vh}
.app{max-width:480px;margin:0 auto;padding-bottom:72px}
.header{background:var(--bg);padding:14px 16px 10px;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:20}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.header-title{font-size:16px;font-weight:700;letter-spacing:-.3px}
.cycle-nav{display:flex;align-items:center;gap:8px}
.cycle-nav button{width:28px;height:28px;border:1px solid var(--border2);border-radius:50%;background:var(--bg2);cursor:pointer;font-size:16px;color:var(--text);display:flex;align-items:center;justify-content:center}
.cycle-label{font-size:12px;color:var(--text2);white-space:nowrap}
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--bg);border-top:1px solid var(--border);display:flex;z-index:20;padding-bottom:env(safe-area-inset-bottom)}
.nav-btn{flex:1;padding:8px 4px 10px;text-align:center;cursor:pointer;font-size:10px;color:var(--text2);border:none;background:none;transition:color .15s}
.nav-btn i{display:block;font-size:20px;margin-bottom:1px}
.nav-btn.active{color:var(--teal);font-weight:600}
.page{display:none;padding:12px}
.page.active{display:block}
/* cards */
.card{background:var(--bg);border-radius:var(--r);border:1px solid var(--border);margin-bottom:10px;overflow:hidden}
.card-hd{padding:12px 14px;border-bottom:1px solid var(--border);font-weight:600;font-size:13px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.card-bd{padding:12px 14px}
/* dashboard */
.dash-welcome{background:var(--teal);border-radius:var(--r);padding:16px;margin-bottom:10px;color:#fff}
.dash-welcome h2{font-size:18px;font-weight:700;margin-bottom:2px}
.dash-welcome p{font-size:12px;opacity:.8}
.staff-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.staff-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:12px;cursor:pointer;transition:border-color .15s;text-align:center}
.staff-card:active{opacity:.7}
.staff-card .avatar{width:44px;height:44px;border-radius:50%;background:var(--teal-bg);color:var(--teal-text);font-size:18px;font-weight:700;display:flex;align-items:center;justify-content:center;margin:0 auto 8px}
.staff-card .s-name{font-weight:600;font-size:14px;margin-bottom:2px}
.staff-card .s-score{font-size:22px;font-weight:700;color:var(--teal);line-height:1}
.staff-card .s-label{font-size:10px;color:var(--text2);margin-top:2px}
.staff-card .s-pt{font-size:11px;color:var(--text2)}
.dash-block{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;margin-bottom:10px;cursor:pointer;display:flex;align-items:center;gap:12px}
.dash-block:active{opacity:.7}
.dash-block-icon{width:40px;height:40px;border-radius:var(--rs);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.dash-block-info{flex:1}
.dash-block-title{font-weight:600;font-size:14px;margin-bottom:2px}
.dash-block-sub{font-size:11px;color:var(--text2)}
.dash-block-arrow{color:var(--text3);font-size:18px}
/* person detail */
.back-btn{display:flex;align-items:center;gap:6px;color:var(--teal);font-size:13px;cursor:pointer;padding:10px 0 4px;font-weight:500}
.person-hero{background:var(--teal);border-radius:var(--r);padding:20px;margin-bottom:10px;color:#fff;text-align:center}
.person-hero .p-avatar{width:60px;height:60px;border-radius:50%;background:rgba(255,255,255,.2);font-size:26px;font-weight:700;display:flex;align-items:center;justify-content:center;margin:0 auto 10px}
.person-hero .p-name{font-size:20px;font-weight:700}
.person-hero .p-type{font-size:12px;opacity:.7;margin-bottom:12px}
.score-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:12px}
.score-cell{background:rgba(255,255,255,.15);border-radius:var(--rs);padding:8px;text-align:center}
.score-cell .sc-val{font-size:20px;font-weight:700}
.score-cell .sc-label{font-size:10px;opacity:.75;margin-top:2px}
.score-total{margin-top:10px;text-align:center}
.score-total .st-val{font-size:32px;font-weight:800}
.score-total .st-label{font-size:12px;opacity:.75}
/* floor tabs */
.floor-tabs{display:flex;gap:6px;padding:10px 14px;overflow-x:auto;border-bottom:1px solid var(--border);scrollbar-width:none}
.floor-tabs::-webkit-scrollbar{display:none}
.ftab{padding:5px 14px;border-radius:20px;font-size:12px;cursor:pointer;white-space:nowrap;border:1px solid var(--border2);background:var(--bg2);color:var(--text2);flex-shrink:0}
.ftab.active{background:var(--primary);color:var(--pt);border-color:var(--primary)}
/* maint table */
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
table.mt{width:100%;border-collapse:collapse;font-size:11px}
table.mt th{background:var(--bg2);padding:6px 3px;text-align:center;border:1px solid var(--border);font-weight:500;white-space:nowrap}
table.mt th.ic{text-align:left;min-width:88px;padding-left:6px}
table.mt td{border:1px solid var(--border);text-align:center;padding:1px}
table.mt td.ic{text-align:left;padding:5px 6px;background:var(--bg2);font-weight:500}
.cb{width:100%;min-height:34px;border:none;background:transparent;cursor:pointer;font-size:10px;color:var(--text2);padding:2px;border-radius:3px;line-height:1.3}
.cb.done{background:var(--teal-bg);color:var(--teal-text);font-weight:600}
.cb:active{opacity:.6}
/* task items */
.task-item{border:1px solid var(--border);border-radius:var(--rs);margin-bottom:8px;background:var(--bg);overflow:hidden}
.task-item.saved{border-color:var(--teal)}
.task-item.dirty{border-color:var(--orange)}
.task-top{padding:10px 12px 8px}
.task-footer{display:flex;align-items:center;justify-content:space-between;padding:7px 12px;border-top:1px solid var(--border);background:var(--bg2)}
.task-status{font-size:11px;color:var(--text3)}
.task-status.is-saved{color:var(--teal)}
.task-status.is-dirty{color:var(--orange)}
.task-actions{display:flex;gap:6px}
.task-btn{padding:5px 12px;border-radius:20px;font-size:12px;cursor:pointer;border:1px solid var(--border2);background:var(--bg);color:var(--text2);font-weight:500}
.task-btn.save-btn{background:var(--teal);color:#fff;border-color:var(--teal)}
.task-btn.clear-btn{background:var(--danger-bg);color:var(--danger);border-color:var(--danger-border)}
.task-btn:active{opacity:.7}
.task-hd{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;gap:8px}
.task-name{font-size:13px;font-weight:600;line-height:1.3}
.task-score-badge{font-size:10px;color:var(--text2);white-space:nowrap;flex-shrink:0}
.chips{display:flex;gap:6px;flex-wrap:wrap}
.chip{padding:6px 11px;border-radius:20px;font-size:12px;cursor:pointer;border:1px solid var(--border2);background:var(--bg2);color:var(--text2);user-select:none}
.chip.on{background:var(--primary);color:var(--pt);border-color:var(--primary)}
.chip.pt-chip{border-style:dashed}
.num-row{display:flex;align-items:center;gap:8px;margin-top:8px}
.num-row label{font-size:12px;color:var(--text2);white-space:nowrap}
.num-row input{width:48px;text-align:center;padding:6px 4px}
.counter-btn{width:32px;height:32px;border-radius:50%;border:1px solid var(--border2);background:var(--bg2);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text);flex-shrink:0;line-height:1}
.counter-btn:active{opacity:.6}
/* forms */
input,select,textarea{width:100%;padding:9px 11px;border:1px solid var(--border2);border-radius:var(--rs);font-size:14px;background:var(--bg);color:var(--text);outline:none;-webkit-appearance:none}
input:focus,select:focus,textarea:focus{border-color:var(--teal)}
.form-row{margin-bottom:12px}
.form-label{font-size:12px;color:var(--text2);margin-bottom:4px;display:block;font-weight:500}
/* buttons */
.btn{padding:9px 16px;border-radius:var(--rs);font-size:13px;cursor:pointer;border:1px solid var(--border2);background:var(--bg2);color:var(--text);font-weight:500}
.btn-primary{background:var(--teal);color:#fff;border-color:var(--teal)}
.btn-danger{background:var(--danger-bg);color:var(--danger);border-color:var(--danger-border)}
.btn-block{width:100%;padding:12px;font-size:14px;text-align:center}
.btn:active{opacity:.75}
/* summary/log */
.sum-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)}
.sum-row:last-child{border-bottom:none}
.log-item{background:var(--bg2);border-radius:var(--rs);padding:8px 11px;margin-bottom:6px}
.log-date{font-weight:600;font-size:12px;margin-bottom:3px}
.log-detail{font-size:11px;color:var(--text2);line-height:1.6}
/* defect */
.def-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)}
.def-row:last-child{border-bottom:none}
.def-ctrls{display:flex;align-items:center;gap:8px}
.def-count{font-size:20px;font-weight:700;min-width:32px;text-align:center}
.def-btn{width:32px;height:32px;border-radius:50%;border:1px solid var(--border2);background:var(--bg2);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text)}
/* work log table */
.wl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
table.wl{width:100%;border-collapse:collapse;font-size:11px}
table.wl th{background:var(--bg2);padding:6px 4px;border:1px solid var(--border);font-weight:500;white-space:nowrap;text-align:center}
table.wl th.date-col{text-align:left;min-width:52px}
table.wl td{border:1px solid var(--border);padding:5px 4px;text-align:center;font-size:11px;color:var(--text2)}
table.wl td.date-col{text-align:left;font-weight:600;color:var(--text);background:var(--bg2)}
table.wl td.has{background:var(--teal-bg);color:var(--teal-text);font-weight:500}
/* modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;align-items:flex-end;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--bg);border-radius:var(--r) var(--r) 0 0;padding:20px;width:100%;max-width:480px;max-height:88vh;overflow-y:auto}
.modal-title{font-size:16px;font-weight:700;margin-bottom:16px}
.modal-btns{display:flex;gap:8px;margin-top:16px}
.modal-btns .btn{flex:1;text-align:center}
/* misc */
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600}
.badge-full{background:var(--teal-bg);color:var(--teal-text)}
.badge-pt{background:var(--bg2);color:var(--text2);border:1px dashed var(--border2)}
.empty{text-align:center;padding:28px;color:var(--text3);font-size:13px}
.empty i{font-size:28px;display:block;margin-bottom:8px}
.toast{position:fixed;bottom:82px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;padding:9px 20px;border-radius:20px;font-size:13px;z-index:300;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap;max-width:320px;text-align:center}
.toast.show{opacity:1}
.parsed-box{border:1px solid var(--border);border-radius:var(--rs);padding:10px;margin-top:8px;background:var(--bg2)}
.progress-bar{height:6px;background:var(--border);border-radius:3px;overflow:hidden;margin-top:4px}
.progress-fill{height:100%;background:var(--teal);border-radius:3px;transition:width .3s}
.date-bar{background:var(--bg);border-bottom:1px solid var(--border);padding:10px 14px;display:flex;align-items:center;gap:10px}
.date-bar label{font-size:12px;color:var(--text2);white-space:nowrap;font-weight:500}
.date-bar input{flex:1}
.settings-row{display:flex;align-items:center;gap:8px;padding:10px 0;border-bottom:1px solid var(--border)}
.settings-row:last-child{border-bottom:none}
.tag{display:inline-block;padding:1px 6px;border-radius:4px;font-size:10px}
</style>
</head>
<body>
<div class="app">
<div class="header">
  <div class="header-top">
    <div class="header-title">路境行旅 房務計分</div>
    <div id="sync-status" style="font-size:10px;display:flex;align-items:center;gap:3px"></div>
    <div class="cycle-nav">
      <button onclick="changeMonth(-1)">&#8249;</button>
      <span class="cycle-label" id="cycle-label"></span>
      <button onclick="changeMonth(1)">&#8250;</button>
    </div>
  </div>
</div>

<!-- 儀表板 -->
<div id="page-dash" class="page active">
  <div id="dash-content"></div>
</div>

<!-- 保養 -->
<div id="page-maint" class="page">
  <div class="card">
    <div class="floor-tabs" id="floor-tabs"></div>
    <div id="maint-body"></div>
  </div>
</div>

<!-- 每日 -->
<div id="page-daily" class="page">
  <div class="card" style="margin-bottom:10px">
    <div class="date-bar">
      <label>日期</label>
      <input type="date" id="daily-date" style="max-width:160px">
    </div>
    <div class="card-bd" style="padding-bottom:8px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
        <label class="form-label" style="margin-bottom:0">貼上掃房日誌（選填）</label>
        <button class="btn" style="padding:4px 10px;font-size:11px" onclick="clearJournal()">清除</button>
      </div>
      <textarea id="journal-text" rows="3" placeholder="將LINE整房日誌貼在這裡，自動解析查房間數..."></textarea>
      <button class="btn btn-primary" style="width:100%;margin-top:6px" onclick="parseJournal()">解析日誌</button>
      <div id="parse-result"></div>
    </div>
  </div>
  <div id="daily-tasks"></div>
  <div class="card">
    <div class="card-hd">額外加分（主管判斷）</div>
    <div class="card-bd">
      <textarea id="extra-note" rows="2" placeholder="自由填寫項目與分數..."></textarea>
      <button class="btn btn-primary btn-block" style="margin-top:8px" onclick="saveExtra()">儲存額外項目</button>
    </div>
  </div>
</div>

<!-- 缺失 -->
<div id="page-defect" class="page">
  <div class="card">
    <div class="card-hd">本期缺失統計 <span style="font-size:11px;color:var(--text2);font-weight:400">每5點扣1品質分</span></div>
    <div class="card-bd" id="defect-summary"></div>
  </div>
  <div class="card">
    <div class="card-hd">新增缺失紀錄</div>
    <div class="card-bd">
      <div class="form-row"><label class="form-label">日期</label><input type="date" id="defect-date"></div>
      <div class="form-row">
        <label class="form-label">房號 <span style="font-weight:400;color:var(--text3)">（輸入後自動帶入負責人）</span></label>
        <input type="text" id="defect-room" placeholder="例：301" oninput="onDefectRoomInput()" autocomplete="off">
        <div id="defect-room-hint" style="font-size:11px;margin-top:4px;min-height:16px"></div>
      </div>
      <div class="form-row"><label class="form-label">負責人</label><div class="chips" id="defect-chips"></div></div>
      <div class="form-row"><label class="form-label">缺失說明</label><input type="text" id="defect-note" placeholder="例：忘記放茶包、有髒汙..."></div>
      <button class="btn btn-primary btn-block" onclick="addDefect()">新增</button>
    </div>
  </div>
  <div class="card">
    <div class="card-hd">缺失紀錄列表</div>
    <div id="defect-list" style="padding:0 14px 14px"></div>
  </div>
</div>

<!-- 設定 -->
<div id="page-settings" class="page">
  <div class="card">
    <div class="card-hd">員工管理</div>
    <div class="card-bd">
      <div id="staff-list"></div>
      <div style="display:flex;gap:6px;margin-top:10px">
        <input id="new-name" placeholder="姓名" style="flex:1">
        <select id="new-type" style="width:72px"><option value="full">正職</option><option value="pt">PT</option></select>
        <button class="btn btn-primary" onclick="addStaff()">新增</button>
      </div>
    </div>
  </div>
  <div class="card">
    <div class="card-hd">樓層樓主</div>
    <div class="card-bd" id="floor-settings"></div>
  </div>
</div>

</div><!-- /app -->

<nav class="bottom-nav">
  <button class="nav-btn active" onclick="switchPage('dash',this)"><i class="ti ti-layout-dashboard"></i>儀表板</button>
  <button class="nav-btn" onclick="switchPage('maint',this)"><i class="ti ti-home-check"></i>保養</button>
  <button class="nav-btn" onclick="switchPage('daily',this)"><i class="ti ti-clipboard-list"></i>每日</button>
  <button class="nav-btn" onclick="switchPage('defect',this)"><i class="ti ti-alert-triangle"></i>缺失</button>
  <button class="nav-btn" onclick="switchPage('settings',this)"><i class="ti ti-settings"></i>設定</button>
</nav>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-title" id="modal-title"></div>
    <div id="modal-body"></div>
    <div class="modal-btns" id="modal-btns"></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const FLOORS={
  '2F':['201','203','205','206','207','208','209','210','211','212','213'],
  '3F':['301','303','305','306','307','308','309','310','311','312','313'],
  '5F':['501','502','503','505','506','507','508','509','510','511','512','513'],
  '6F':['601','602','603','605','606','607','608','609','610','611','612','613'],
  '7F':['701','702','703','705','706','707','708','709','710','711','712','713']
};
const MI=['冷氣濾網+外殼','床底+客房角落','冰箱+快煮壺','燈具+木質傢俱','窗戶窗框+玻璃','浴室五金+排水孔','浴室整間除黴','馬桶+水箱'];
const TASKS=[
  {id:'inspect',  label:'查房',           score:1,  perUnit:true, multi:false, ptOk:true,  deskOk:true},
  {id:'dispatch', label:'掃房日誌派房',    score:2,  perUnit:false,multi:false, ptOk:false, deskOk:false},
  {id:'linen',    label:'否司脫布巾對點',  score:5,  perUnit:false,multi:false, ptOk:false, deskOk:false},
  {id:'am_clean', label:'早上公清',        score:2,  perUnit:false,multi:true,  ptOk:false, deskOk:false},
  {id:'pm_clean', label:'下午公清',        score:5,  perUnit:false,multi:true,  ptOk:false, deskOk:false},
  {id:'co12',     label:'單/雙人退房全配', score:3,  perUnit:true, multi:false, ptOk:true,  deskOk:false},
  {id:'co34',     label:'三/四人退房全配', score:5,  perUnit:true, multi:false, ptOk:true,  deskOk:false},
  {id:'carpet',   label:'樓層廊道地毯清洗',score:15, perUnit:false,multi:true,  ptOk:false, deskOk:false},
  {id:'rooftop',  label:'頂樓平台地板刷洗',score:10, perUnit:false,multi:true,  ptOk:false, deskOk:false},
  {id:'linen_cnt',label:'館內布巾盤點/採購',score:20, perUnit:false,multi:true,  ptOk:false, deskOk:false},
  {id:'arcade',   label:'騎樓刷洗',        score:20, perUnit:false,multi:true,  ptOk:false, deskOk:false},
  {id:'corridor', label:'樓層廊道清潔保養', score:20, perUnit:false,multi:true,  ptOk:false, deskOk:false},
];

let S={
  year:0,month:0,
  staff:[
    {name:'欣芸',type:'full'},{name:'詠琪',type:'full'},
    {name:'郁庭',type:'full'},{name:'秀蘭',type:'full'},
    {name:'庭妤',type:'pt'}
  ],
  floors:{'2F':'欣芸','3F':'詠琪','5F':'均分','6F':'郁庭','7F':'秀蘭'},
  maint:{},daily:{},defects:[],defectCounts:{},bonuses:{}
};
let curFloor='2F';

function getK(){return `${S.year}-${String(S.month).padStart(2,'0')}`;}
function getCycleLabel(){
  const pm=S.month===1?12:S.month-1,py=S.month===1?S.year-1:S.year;
  return `${py}/${pm}/26－${S.year}/${S.month}/25`;
}
const GAS_URL='https://script.google.com/macros/s/AKfycbyF22pTeYz_2MxxsYePCbNnEaWlBMMPkjf1eydI4et4PV0_wnUsOuboEBUDEpBN2OTM/exec';
let _saving=false,_dirty=false,_saveTimer=null;

function save(){
  try{localStorage.setItem('hk2',JSON.stringify(S));}catch(e){}
  _dirty=true;
  clearTimeout(_saveTimer);
  _saveTimer=setTimeout(()=>syncToSheet(),1500);
}

function syncToSheet(){
  if(_saving){_dirty=true;return;}
  _saving=true;_dirty=false;
  showSyncStatus('saving');
  fetch(GAS_URL,{method:'POST',body:JSON.stringify({action:'save',payload:S})})
    .then(r=>r.json())
    .then(d=>{
      _saving=false;
      if(d.ok){showSyncStatus('ok');}
      else{showSyncStatus('err');}
      if(_dirty)syncToSheet();
    })
    .catch(err=>{_saving=false;showSyncStatus('err');});
}

function load(){
  try{const d=localStorage.getItem('hk2');if(d)Object.assign(S,JSON.parse(d));}catch(e){}
}

async function loadFromSheet(){
  showSyncStatus('loading');
  try{
    const r=await fetch(GAS_URL,{method:'POST',body:JSON.stringify({action:'load'})});
    const d=await r.json();
    if(d.ok&&d.data&&d.data!=='{}'){
      const remote=JSON.parse(d.data);
      Object.assign(S,remote);
      try{localStorage.setItem('hk2',JSON.stringify(S));}catch(e){}
    }
    showSyncStatus('ok');
    initMonth();
    document.getElementById('cycle-label').textContent=getCycleLabel();
    renderDash();
  }catch(err){
    showSyncStatus('err');
    console.error(err);
    initMonth();
    document.getElementById('cycle-label').textContent=getCycleLabel();
    renderDash();
  }
}

function showSyncStatus(state){
  const el=document.getElementById('sync-status');
  if(!el)return;
  if(state==='loading'){el.innerHTML='<i class="ti ti-refresh"></i> 載入中...';el.style.color='var(--text3)';}
  else if(state==='saving'){el.innerHTML='<i class="ti ti-cloud-upload"></i> 儲存中...';el.style.color='var(--text3)';}
  else if(state==='ok'){el.innerHTML='<i class="ti ti-cloud-check"></i> 已同步';el.style.color='var(--teal)';}
  else if(state==='err'){el.innerHTML='<i class="ti ti-cloud-x"></i> 同步失敗（本地已存）';el.style.color='var(--danger)';}
}

function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}

function initMonth(){const n=new Date();S.year=n.getFullYear();S.month=n.getMonth()+1;}
function changeMonth(d){
  S.month+=d;
  if(S.month>12){S.month=1;S.year++;}
  if(S.month<1){S.month=12;S.year--;}
  document.getElementById('cycle-label').textContent=getCycleLabel();
  renderCurrentPage();save();
}

let curPage='dash';
function switchPage(p,btn){
  curPage=p;
  document.querySelectorAll('.page').forEach(el=>el.classList.remove('active'));
  document.getElementById('page-'+p).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(el=>el.classList.remove('active'));
  btn.classList.add('active');
  renderCurrentPage();
}
function renderCurrentPage(){
  if(curPage==='dash') renderDash();
  else if(curPage==='maint'){renderFloorTabs();renderMaint();}
  else if(curPage==='daily') initDaily();
  else if(curPage==='defect') renderDefect();
  else if(curPage==='settings') renderSettings();
}

// ── SCORES ──
function calcScores(){
  const k=getK();
  const sc={},rooms={},maintSc={},workSc={};
  S.staff.forEach(s=>{sc[s.name]=0;rooms[s.name]=0;maintSc[s.name]=0;workSc[s.name]=0;});
  Object.values(S.maint[k]||{}).forEach(v=>{
    if(!v)return;
    v.by.split('、').forEach(n=>{if(sc[n]!==undefined){sc[n]+=2;maintSc[n]+=2;}});
  });
  Object.values(S.daily[k]||{}).forEach(day=>{
    (day.tasks||[]).forEach(t=>{
      const task=TASKS.find(dt=>dt.id===t.id);
      if(!task||!t.names||!t.names.length)return;
      if(task.id==='inspect'||task.id==='co12'||task.id==='co34'){
        t.names.forEach(n=>{
          if(n==='櫃台')return; // 櫃台查房不計分，只記錄
          if(rooms[n]!==undefined)rooms[n]+=(t.num||0);
          const s=S.staff.find(s=>s.name===n);
          if(s&&s.type==='full'&&task.id!=='inspect'){sc[n]+=task.score*(t.num||0);workSc[n]+=task.score*(t.num||0);}
          if(s&&s.type==='full'&&task.id==='inspect'){sc[n]+=(t.num||0);workSc[n]+=(t.num||0);}
        });return;
      }
      const base=task.perUnit?task.score*(t.num||1):task.score;
      const per=task.multi?base/t.names.length:base;
      t.names.forEach(n=>{
        const s=S.staff.find(s=>s.name===n);
        if(!s||s.type==='pt')return;
        sc[n]+=per;workSc[n]+=per;
      });
    });
  });
  // bonus
  const bonuses=S.bonuses[k]||{};
  S.staff.filter(s=>s.type==='full').forEach(s=>{
    const b=parseFloat(bonuses[s.name])||0;
    sc[s.name]+=b;
  });
  // defect deduct
  S.staff.filter(s=>s.type==='full').forEach(s=>{
    const d=Math.floor((S.defectCounts[s.name]||0)/5);
    sc[s.name]-=d;
  });
  return {sc,rooms,maintSc,workSc};
}

  const maxMaint=Object.values(FLOORS).reduce((a,r)=>a+r.length,0)*MI.length;
  const dailyDays=Object.keys(S.daily[k]||{}).length;
  const defTotal=S.staff.reduce((a,s)=>a+(S.defectCounts[s.name]||0),0);

  let html=`<div class="dash-welcome">
    <h2>本期工作概況</h2>

  html+=`<div class="staff-grid">`;
  S.staff.forEach(s=>{
    const score=s.type==='pt'?null:Math.round((sc[s.name]||0)*10)/10;

    html+=`<div class="staff-card" onclick="showPerson('${s.name}')">

      ${s.type==='pt'
        ?`<div class="s-pt">打掃 ${rc} 間</div>`
        :`<div class="s-score">${score}</div><div class="s-label">總分 ／ 打掃${rc}間</div>`}
    </div>`;
  });
  html+=`</div>`;

  // 4 blocks
  const blocks=[
    {icon:'ti-home-check',color:'var(--teal-bg)',icolor:'var(--teal)',title:'保養紀錄',sub:`本期已完成 ${maintTotal} 格，共 ${maxMaint} 格`,page:'maint'},
    {icon:'ti-clipboard-list',color:'#fff3e0',icolor:'#e65c00',title:'每日工作紀錄',sub:`已登記 ${dailyDays} 天`,page:'daily-log'},
    {icon:'ti-alert-triangle',color:'var(--danger-bg)',icolor:'var(--danger)',title:'缺失統計',sub:`本期累計 ${defTotal} 點缺失`,page:'defect'},
    {icon:'ti-chart-bar',color:' #e8f5e9',icolor:'#2e7d32',title:'分數彙總',sub:`${fullStaff.length} 位正職本期計分`,page:'summary'},
  ];
  blocks.forEach(b=>{
    html+=`<div class="dash-block" onclick="dashNav('${b.page}')">
      <div class="dash-block-icon" style="background:${b.color}"><i class="ti ${b.icon}" style="color:${b.icolor}"></i></div>
      <div class="dash-block-info"><div class="dash-block-title">${b.title}</div><div class="dash-block-sub">${b.sub}</div></div>
      <i class="ti ti-chevron-right dash-block-arrow"></i>
    </div>`;

  document.getElementById('dash-content').innerHTML=html;
}

function dashNav(p){
  const navBtns=document.querySelectorAll('.nav-btn');
  if(p==='maint'){switchPage('maint',navBtns[1]);}
  else if(p==='daily-log'){showDailyLog();}

// ── PERSON DETAIL ──
function showPerson(name){
  const s=S.staff.find(s=>s.name===name);
  const {sc,rooms,maintSc,workSc}=calcScores();
  const k=getK();
  const total=Math.round((sc[name]||0)*10)/10;
  const ms=Math.round((maintSc[name]||0)*10)/10;
  const ws=Math.round((workSc[name]||0)*10)/10;
  const def=S.defectCounts[name]||0;
  const deduct=s.type==='full'?Math.floor(def/5):0;
  const bonus=parseFloat((S.bonuses[k]||{})[name])||0;
  const rc=rooms[name]||0;

  const el=document.getElementById('dash-content');
  let html=`<div class="back-btn" onclick="renderDash()"><i class="ti ti-arrow-left"></i> 返回儀表板</div>`;
  html+=`<div class="person-hero">
    <div class="p-avatar">${name[0]}</div>
    <div class="p-name">${name}</div>
    <div class="p-type">${s.type==='pt'?'PT（不計加分）':'正職'} ／ 打掃 ${rc} 間</div>`;
  if(s.type==='full'){
    html+=`<div class="score-grid">
      <div class="score-cell"><div class="sc-val">${ms}</div><div class="sc-label">保養分</div></div>
      <div class="score-cell"><div class="sc-val">${ws}</div><div class="sc-label">工作分</div></div>
      <div class="score-cell"><div class="sc-val">${bonus>0?'+'+bonus:bonus}</div><div class="sc-label">館長加分</div></div>
    </div>
    <div class="score-grid" style="margin-top:6px">
      <div class="score-cell"><div class="sc-val">${def}</div><div class="sc-label">缺失點</div></div>
      <div class="score-cell"><div class="sc-val" style="color:#ff6b6b">${deduct>0?'-'+deduct:0}</div><div class="sc-label">品質扣分</div></div>
      <div class="score-cell"><div class="sc-val">${total}</div><div class="sc-label">本期總分</div></div>
    </div>`;
  }
  html+=`</div>`;

  if(s.type==='full'){
    // bonus editor
    html+=`<div class="card"><div class="card-hd">館長加分</div><div class="card-bd">
      <div style="display:flex;gap:8px;align-items:center">
        <input type="number" id="bonus-input-${name}" value="${bonus}" placeholder="0" style="flex:1">
        <button class="btn btn-primary" onclick="saveBonus('${name}')">儲存</button>
      </div>
      <div style="font-size:11px;color:var(--text2);margin-top:6px">主管依工作內容自行判斷加分</div>
    </div></div>`;
  }

  // daily breakdown
  const dailyD=S.daily[k]||{};
  const dates=Object.keys(dailyD).sort();
  let dailyHtml='';
  dates.forEach(date=>{
    const day=dailyD[date];
    const items=(day.tasks||[]).filter(t=>t.names&&t.names.includes(name));
    if(!items.length)return;
    const detail=items.map(t=>{
      const task=TASKS.find(dt=>dt.id===t.id);
      if(!task)return'';
      if(task.perUnit) return `${task.label} ${t.num||0}間`;
      return task.label;
    }).filter(Boolean).join('、');
    dailyHtml+=`<div class="log-item"><div class="log-date">${date}</div><div class="log-detail">${detail}</div></div>`;
  });
  html+=`<div class="card"><div class="card-hd">本期工作明細</div><div style="padding:0 14px 14px">${dailyHtml||'<div class="empty" style="padding:16px 0">尚無工作紀錄</div>'}</div></div>`;

  // maint breakdown
  const maintD=S.maint[k]||{};
  const myMaint=Object.entries(maintD).filter(([,v])=>v&&v.by.includes(name));
  let mHtml='';
  myMaint.sort((a,b)=>a[1].date.localeCompare(b[1].date)).forEach(([ck,v])=>{
    const p=ck.split('|');
    mHtml+=`<div class="log-item"><div class="log-date">${v.date} ${p[0]} ${p[1]}</div><div class="log-detail">${p[2]}</div></div>`;
  });
  html+=`<div class="card"><div class="card-hd">保養紀錄（共 ${myMaint.length} 格）</div><div style="padding:0 14px 14px">${mHtml||'<div class="empty" style="padding:16px 0">尚無保養紀錄</div>'}</div></div>`;

  // defect list
  const myDef=S.defects.filter(d=>d.name===name);
  let dHtml='';
  myDef.slice().reverse().forEach(d=>{
    dHtml+=`<div class="log-item"><div class="log-date">${d.date} 房號：${d.room}</div><div class="log-detail">${d.note||'無說明'}</div></div>`;
  });
  html+=`<div class="card"><div class="card-hd">缺失紀錄（${myDef.length} 筆）</div><div style="padding:0 14px 14px">${dHtml||'<div class="empty" style="padding:16px 0">無缺失紀錄</div>'}</div></div>`;

  el.innerHTML=html;
}

function saveBonus(name){
  const k=getK();
  if(!S.bonuses[k]) S.bonuses[k]={};
  const val=parseFloat(document.getElementById('bonus-input-'+name).value)||0;
  S.bonuses[k][name]=val;
  save();toast('館長加分已儲存');showPerson(name);
}

// ── DAILY LOG VIEW ──
function showDailyLog(){
  const k=getK();
  const dates=Object.keys(S.daily[k]||{}).sort();
  // build task columns
  const taskCols=TASKS.slice();
  let html=`<div class="back-btn" onclick="renderDash()"><i class="ti ti-arrow-left"></i> 返回儀表板</div>`;
  html+=`<div class="card"><div class="card-hd">每日工作紀錄</div>`;
  if(dates.length===0){html+=`<div class="empty">尚無紀錄</div></div>`;document.getElementById('dash-content').innerHTML=html;return;}

  // Short task labels for table header
  const shortLabels={'inspect':'查房','co12':'單雙退','co34':'三四退','dispatch':'派房','linen':'布巾點','carpet':'地毯洗','rooftop':'頂樓刷','linen_cnt':'盤點','am_clean':'早公清','pm_clean':'午公清','arcade':'騎樓刷','corridor':'廊道保'};

  html+=`<div class="wl-wrap"><table class="wl"><thead><tr><th class="date-col">日期</th>`;
  taskCols.forEach(t=>html+=`<th>${shortLabels[t.id]||t.label}</th>`);
  html+=`</tr></thead><tbody>`;
  dates.forEach(date=>{
    const day=S.daily[k][date];
    html+=`<tr><td class="date-col">${date.slice(5)}</td>`;
    taskCols.forEach(t=>{
      const tv=(day.tasks||[]).find(dt=>dt.id===t.id);
      if(tv&&tv.names&&tv.names.length){
        const names=tv.names.join('、');
        const num=tv.num>1?` ×${tv.num}`:'';
        html+=`<td class="has">${names}${num}</td>`;
      } else {html+=`<td></td>`;}
    });
    html+=`</tr>`;
  });
  html+=`</tbody></table></div>`;
  if(dates.some(d=>S.daily[k][d].extra)){
    html+=`<div style="padding:8px 14px;border-top:1px solid var(--border)"><div style="font-size:12px;font-weight:600;margin-bottom:6px">額外項目</div>`;
    dates.forEach(d=>{if(S.daily[k][d].extra) html+=`<div class="log-item"><div class="log-date">${d.slice(5)}</div><div class="log-detail">${S.daily[k][d].extra}</div></div>`;});
    html+=`</div>`;
  }
  html+=`</div>`;
  document.getElementById('dash-content').innerHTML=html;
}

function renderMaint(){
  const k=getK();
  const rooms=FLOORS[curFloor];
  const owner=S.floors[curFloor]||'均分';
  const isShared=owner==='均分';
  let html=`<div style="padding:8px 14px 6px;font-size:12px;color:var(--text2);display:flex;justify-content:space-between">
    <span>樓主：<b style="color:var(--text)">${owner}</b></span>
    <span>${isShared?'點格子選負責人':'點格子自動帶入今日'}</span>
  </div>`;
  html+=`<div class="tbl-wrap"><table class="mt"><thead><tr><th class="ic">項目</th>`;
  rooms.forEach(r=>html+=`<th>${r}</th>`);
  html+=`</tr></thead><tbody>`;
  MI.forEach(item=>{
    html+=`<tr><td class="ic">${item}</td>`;
    rooms.forEach(room=>{
      const ck=`${curFloor}|${room}|${item}`;
      const val=(S.maint[k]||{})[ck];
      html+=`<td><button class="cb${val?' done':''}" onclick="${val?`openCellEdit('${ck}')`:`openCell('${ck}')`}">${val?val.date.slice(5)+'<br>'+val.by:'+'}</button></td>`;
    });
    html+=`</tr>`;
  });
  html+=`</tbody></table></div>`;
  const done=Object.keys(S.maint[k]||{}).filter(k=>k.startsWith(curFloor+'|')).length;
  const total=rooms.length*MI.length;
  const pct=Math.round(done/total*100);
  html+=`<div style="padding:10px 14px">
    <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--text2);margin-bottom:4px"><span>本樓層完成進度</span><span>${done}/${total} (${pct}%)</span></div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
  </div>`;
  document.getElementById('maint-body').innerHTML=html;
}
function openCell(ck){
  const k=getK();
  const owner=S.floors[curFloor]||'均分';
  const today=new Date().toISOString().slice(0,10);
  if(owner!=='均分'){
    if(!S.maint[k])S.maint[k]={};
    S.maint[k][ck]={date:today,by:owner};
    save();renderMaint();toast('已填入');return;
  }
  const p=ck.split('|');
  openModal(`${p[1]} – ${p[2]}`,`
    <div class="form-row"><label class="form-label">日期</label><input type="date" id="md" value="${today}"></div>
    <div class="form-row"><label class="form-label">負責人（可多選）</label>
    <div class="chips">${S.staff.filter(s=>s.type==='full').map(s=>`<div class="chip" onclick="this.classList.toggle('on')">${s.name}</div>`).join('')}</div></div>
  `,[
    {l:'取消',c:'btn',f:'closeModal()'},
    {l:'確認',c:'btn btn-primary',f:`saveMaint('${ck}',false)`}
  ]);
}
function openCellEdit(ck){
  const k=getK();const val=(S.maint[k]||{})[ck];const p=ck.split('|');

function renderDailyTasks(){
  const date=document.getElementById('daily-date').value;
  const k=getK();
  const saved=(S.daily[k]||{})[date]||{tasks:[],extra:''};
  document.getElementById('extra-note').value=saved.extra||'';
  // 換日期時清掉解析結果（文字框保留，方便重新貼）
  document.getElementById('parse-result').innerHTML='';
  window._parsed=null;
  window._parsedCheckout=0;
  window._parsedDeskInspect=false;
  let html='';
  TASKS.forEach(task=>{
    const sv=saved.tasks?.find(t=>t.id===task.id)||null;
    const hasSaved=sv&&sv.names&&sv.names.length>0;
    const baseStaff=task.multi?S.staff:S.staff.filter(s=>s.type==='full');
    let staffList=[...baseStaff];
    if(task.deskOk) staffList=[...staffList,{name:'櫃台',type:'desk'}];
    const chips=staffList.map(s=>{
      const isDesk=s.type==='desk';
      const isOn=sv&&sv.names.includes(s.name);
      const cls=['chip'];
      if(isDesk) cls.push('desk-chip');
      else if(s.type==='pt') cls.push('pt-chip');
      if(isOn) cls.push('on');
      const toggle=task.multi?`this.classList.toggle('on')`:`pickOne(this)`;
      return `<div class="${cls.join(' ')}" onclick="${toggle}">${s.name}</div>`;
    }).join('');
    const numHtml=task.perUnit?`<div class="num-row"><label>間數</label><button class="counter-btn" onclick="adjNum('${task.id}',-1)">−</button><input type="number" id="num-${task.id}" value="${sv?sv.num||0:0}" min="0" onchange="markDirty('${task.id}')" style="text-align:center"><button class="counter-btn" onclick="adjNum('${task.id}',1)">+</button></div>`:'';
    const statusTxt=hasSaved?`已儲存：${sv.names.join('、')}${sv.num>1?' ×'+sv.num:''}`:'尚未儲存';
    const statusCls=hasSaved?'is-saved':'';
    html+=`<div class="task-item${hasSaved?' saved':''}" id="ti-${task.id}">
      <div class="task-top">
        <div class="task-hd">
          <span class="task-name">${task.label}</span>
          <span class="task-badge">${task.score}分/${task.perUnit?'間':'次'}${task.multi?' 均分':''}</span>
        </div>
        <div class="chips" id="chips-${task.id}">${chips}</div>
        ${numHtml}
      </div>
      <div class="task-footer" id="tf-${task.id}">
        <span class="task-status ${statusCls}" id="ts-${task.id}">${statusTxt}</span>
        <div class="task-actions">
          <button class="task-btn clear-btn" onclick="clearTask('${task.id}')">清除</button>
          <button class="task-btn save-btn" onclick="saveTask('${task.id}')">儲存</button>
        </div>
      </div>
    </div>`;
  });
  document.getElementById('daily-tasks').innerHTML=html;
  TASKS.forEach(task=>{
    const container=document.getElementById('chips-'+task.id);
    if(container) container.addEventListener('click',()=>markDirty(task.id));
  });
}

function markDirty(taskId){
  const ti=document.getElementById('ti-'+taskId);
  const ts=document.getElementById('ts-'+taskId);
  if(ti){ti.classList.remove('saved');ti.classList.add('dirty');}
  if(ts){ts.textContent='有變更，請儲存';ts.className='task-status is-dirty';}
}

function saveTask(taskId){
  const date=document.getElementById('daily-date').value;
  if(!date){toast('請先選日期');return;}
  const k=getK();
  if(!S.daily[k])S.daily[k]={};
  if(!S.daily[k][date])S.daily[k][date]={tasks:[],extra:''};
  const names=[...document.querySelectorAll(`#chips-${taskId} .chip.on`)].map(c=>c.textContent);
  const numEl=document.getElementById('num-'+taskId);
  const num=numEl?parseInt(numEl.value)||0:1;
  const tasks=S.daily[k][date].tasks||[];
  const idx=tasks.findIndex(t=>t.id===taskId);
  if(idx>=0) tasks[idx]={id:taskId,names,num};
  else tasks.push({id:taskId,names,num});
  S.daily[k][date].tasks=tasks;
  // also store roomMap for inspect task
  if(taskId==='inspect'&&window._parsed){
    if(!S.daily[k][date].roomMap)S.daily[k][date].roomMap={};
    window._parsed.forEach(r=>{
      const matched=S.staff.find(s=>s.name===r.name||r.name.includes(s.name)||s.name.includes(r.name));
      if(!matched||!r.rooms)return;
      r.rooms.forEach(room=>{S.daily[k][date].roomMap[room]=matched.name;});
    });
  }
  save();
  const ti=document.getElementById('ti-'+taskId);
  const ts=document.getElementById('ts-'+taskId);
  const task2=TASKS.find(t=>t.id===taskId);
  const hasSaved=names.length>0;
  if(ti){ti.classList.remove('dirty');ti.classList.toggle('saved',hasSaved);}
  if(ts){
    if(hasSaved){
      const numLabel=task2&&task2.perUnit&&num>0?` ×${num}間`:'';
      ts.textContent=`已儲存：${names.join('、')}${numLabel}`;
      ts.className='task-status is-saved';
    } else {
      ts.textContent='尚未儲存';
      ts.className='task-status';
    }
  }
  toast(`${task2?.label} 已儲存`);
}

function clearTask(taskId){
  const date=document.getElementById('daily-date').value;
  if(!date)return;
  document.querySelectorAll(`#chips-${taskId} .chip`).forEach(c=>c.classList.remove('on'));
  const numEl=document.getElementById('num-'+taskId);
  if(numEl)numEl.value=0;
  const k=getK();
  if(S.daily[k]&&S.daily[k][date]){
    const tasks=S.daily[k][date].tasks||[];
    const idx=tasks.findIndex(t=>t.id===taskId);
    if(idx>=0)tasks.splice(idx,1);
  }
  save();
  const ti=document.getElementById('ti-'+taskId);
  const ts=document.getElementById('ts-'+taskId);
  if(ti){ti.classList.remove('saved','dirty');}
  if(ts){ts.textContent='已清除';ts.className='task-status';}
  toast(`${TASKS.find(t=>t.id===taskId)?.label} 已清除`);
}

// Journal parser
function parseJournal(){
  const text=document.getElementById('journal-text').value.trim();
  if(!text){toast('請貼上日誌文字');return;}

  // 從第一行自動抓日期（例：0527整房日誌 → 當年5/27）
  const dateMatch=text.match(/(\d{2})(\d{2})\s*整房日誌/);
  if(dateMatch){
    const mm=dateMatch[1].padStart(2,'0');
    const dd=dateMatch[2].padStart(2,'0');
    // 判斷年份：用目前系統年份，若月份比當前月份大很多則取前一年
    const now=new Date();
    let yr=now.getFullYear();
    const mon=parseInt(mm);
    if(mon>now.getMonth()+3) yr--; // 跨年保護
    const dateStr=`${yr}-${mm}-${dd}`;
    const dateEl=document.getElementById('daily-date');
    if(dateEl&&dateEl.value!==dateStr){
      dateEl.value=dateStr;
      renderDailyTasks(); // 切換到該日期
    }
  }

  // 解析退房間數
  let checkoutTotal=0;
  const coMatch=text.match(/退房間數[：:]\s*(\d+)/);
  if(coMatch) checkoutTotal=parseInt(coMatch[1]);

  // 解析查房單位
  let deskInspect=false;
  if(/查房單位[：:]\s*(櫃台|櫃檯|front|desk)/i.test(text)) deskInspect=true;

  // 解析每個人掃房
  const results=[];
  let cur=null,curRooms=[];

  text.split('\n').forEach(line=>{
    const trimmed=line.trim();
    if(!trimmed) return;

    // 跳過標題行
    if(/整房日誌/.test(trimmed)) return;
    if(/^(退房間數|查房單位)[：:]/.test(trimmed)) return;

    // ⚠️ 備註行
    if(/^⚠️/.test(trimmed)){
      if(cur&&results.length) results[results.length-1].note=(results[results.length-1].note||'')+' '+trimmed.replace(/^⚠️\s*/,'').trim();
      return;
    }

    // 姓名：N間 — 支援中文冒號、英文冒號
    const nameMatch=trimmed.match(/^([一-龥a-zA-Z]{1,6})\s*[：:]\s*(\d+)\s*間/);
    if(nameMatch){
      if(cur) results.push({name:cur,count:curRooms.length,rooms:[...curRooms],note:''});
      cur=nameMatch[1].trim();
      curRooms=[];
      return;
    }

    // 房號行：支援句點、頓號、逗號、空格、換行等任意分隔
    if(cur){
      const ns=trimmed.match(/\d{3}/g);
      if(ns) curRooms.push(...ns);
    }
  });

  if(cur) results.push({name:cur,count:curRooms.length,rooms:[...curRooms],note:''});

  if(!results.length&&!checkoutTotal&&!deskInspect){toast('解析失敗，請確認格式');return;}

  window._parsed=results;
  window._parsedCheckout=checkoutTotal;
  window._parsedDeskInspect=deskInspect;

  // 顯示結果
  let html=`<div class="parsed-box">`;
  if(checkoutTotal>0) html+=`<div style="padding:4px 0;border-bottom:1px solid var(--border);font-size:12px;color:var(--teal)">✓ 退房間數：${checkoutTotal} 間</div>`;
  if(deskInspect) html+=`<div style="padding:4px 0;border-bottom:1px solid var(--border);font-size:12px;color:var(--orange)">✓ 查房單位：櫃台</div>`;
  if(results.length){
    html+=`<div style="font-size:12px;font-weight:600;margin:6px 0 4px">掃房人員</div>`;
    results.forEach(r=>{
      const matched=S.staff.find(s=>s.name===r.name||r.name.includes(s.name)||s.name.includes(r.name));
      const note=r.note?` <span style="color:var(--text3)">${r.note.trim()}</span>`:'';
      html+=`<div style="padding:4px 0;border-bottom:1px solid var(--border);font-size:12px">${r.name}：${r.count}間${note} ${matched?'<span style="color:var(--teal)">✓ '+matched.name+'</span>':'<span style="color:var(--danger)">⚠ 未找到</span>'}</div>`;
    });
  }
  html+=`<button class="btn" style="width:100%;margin-top:8px;font-size:11px;color:var(--text2)" onclick="applyParsed()">重新套用</button></div>`;
  document.getElementById('parse-result').innerHTML=html;
  // 自動套用
  applyParsed();
}

function applyParsed(){
  const date=document.getElementById('daily-date').value;

  // 存房號對應人名（供缺失查詢）
  if(date&&window._parsed){
    const k=getK();
    if(!S.daily[k])S.daily[k]={};
    if(!S.daily[k][date])S.daily[k][date]={tasks:[],extra:''};
    if(!S.daily[k][date].roomMap)S.daily[k][date].roomMap={};
    window._parsed.forEach(r=>{
      const matched=S.staff.find(s=>s.name===r.name||r.name.includes(s.name)||s.name.includes(r.name));
      if(!matched||!r.rooms)return;
      r.rooms.forEach(room=>{S.daily[k][date].roomMap[room]=matched.name;});
    });
    save();
  }

  // 套用查房：
  // 如果是櫃台查房 → 只選「櫃台」chip，不選任何房務人員
  // 否則 → 依日誌選對應房務人員
  const inspectChips=document.querySelectorAll('#chips-inspect .chip');
  inspectChips.forEach(c=>c.classList.remove('on'));
  if(window._parsedDeskInspect){
    inspectChips.forEach(c=>{if(c.textContent==='櫃台')c.classList.add('on');});
  } else if(window._parsed){
    window._parsed.forEach(r=>{
      const matched=S.staff.find(s=>s.name===r.name||r.name.includes(s.name)||s.name.includes(r.name));
      if(!matched)return;
      inspectChips.forEach(c=>{if(c.textContent===matched.name)c.classList.add('on');});
    });
  }
  // 查房間數
  const inspectNum=document.getElementById('num-inspect');
  if(inspectNum&&window._parsed){
    const total=window._parsed.reduce((a,r)=>a+r.count,0);
    if(total>0) inspectNum.value=total;
  }
  markDirty('inspect');

  // 套用退房間數（單/雙人，自動填 co12）
  if(window._parsedCheckout>0){
    const co12Num=document.getElementById('num-co12');
    if(co12Num) co12Num.value=window._parsedCheckout;
    markDirty('co12');
  }

  toast('已套用！請確認各項後按「儲存」');
}

function adjDef(name,d){
  S.defectCounts[name]=(S.defectCounts[name]||0)+d;
  if(S.defectCounts[name]<0)S.defectCounts[name]=0;
  save();renderDefect();
}
function lookupRoomOwner(room){
  if(!room||room.length<3)return null;
  const k=getK();
  // Search all days in current cycle for this room
  const daily=S.daily[k]||{};
  const defDate=document.getElementById('defect-date').value;
  // Prefer exact date match first, then any date
  const sorted=Object.keys(daily).sort((a,b)=>{
    if(defDate){if(a===defDate)return-1;if(b===defDate)return 1;}
    return b.localeCompare(a);
  });
  for(const date of sorted){
    const rm=(daily[date]||{}).roomMap||{};
    if(rm[room])return{name:rm[room],date};
  }
  return null;
}
function onDefectRoomInput(){
  const room=document.getElementById('defect-room').value.trim();
  const hint=document.getElementById('defect-room-hint');
  if(!hint)return;
  if(room.length>=3){
    const found=lookupRoomOwner(room);
    if(found){
      hint.innerHTML=`<span style="color:var(--teal)">✓ ${found.date} 由 <b>${found.name}</b> 負責</span>`;
      // Auto-select chip
      document.querySelectorAll('#defect-chips .chip').forEach(c=>{
        c.classList.toggle('on',c.textContent===found.name);
      });
    } else {
      hint.innerHTML=`<span style="color:var(--text3)">查無此房號的掃房紀錄，請手動選負責人</span>`;
      document.querySelectorAll('#defect-chips .chip').forEach(c=>c.classList.remove('on'));

    hint.innerHTML='';

}

// ── EXPORT ──
function exportDailyScore(){
  const k=getK();
  const pm=S.month===1?12:S.month-1,py=S.month===1?S.year-1:S.year;

  // 人員排序：固定順序優先，其他正職接著，PT最後
  const fixedOrder=['詠琪','郁庭','秀蘭','欣芸'];
  const fullStaff=S.staff.filter(s=>s.type==='full');
  const ptStaff=S.staff.filter(s=>s.type==='pt');
  const orderedFull=[
    ...fixedOrder.map(n=>fullStaff.find(s=>s.name===n)).filter(Boolean),
    ...fullStaff.filter(s=>!fixedOrder.includes(s.name))
  ];
  const allStaff=[...orderedFull,...ptStaff];

  // 計算每天每人得分
  const daily=S.daily[k]||{};
  const dates=Object.keys(daily).sort();
  const maint=S.maint[k]||{};

  // 保養分：按日期分配（用完成日期）
  const maintByDate={};
  Object.values(maint).forEach(v=>{
    if(!v)return;
    if(!maintByDate[v.date])maintByDate[v.date]={};
    v.by.split('、').forEach(n=>{
      maintByDate[v.date][n]=(maintByDate[v.date][n]||0)+2;
    });
  });

  // 建立每日得分表
  const scoreByDate={};
  dates.forEach(date=>{
    scoreByDate[date]={};
    const day=daily[date]||{};
    (day.tasks||[]).forEach(t=>{
      const task=TASKS.find(dt=>dt.id===t.id);
      if(!task||!t.names||!t.names.length)return;
      // 只計正職、跳過櫃台
      const scorable=t.names.filter(n=>n!=='櫃台'&&S.staff.find(s=>s.name===n&&s.type==='full'));
      if(!scorable.length)return;
      let pts=0;
      if(task.perUnit) pts=task.score*(t.num||0);
      else pts=task.score;
      const per=task.multi?pts/scorable.length:pts;
      scorable.forEach(n=>{
        scoreByDate[date][n]=(scoreByDate[date][n]||0)+per;
      });
    });
    // 加保養分
    if(maintByDate[date]){
      Object.entries(maintByDate[date]).forEach(([n,pts])=>{
        scoreByDate[date][n]=(scoreByDate[date][n]||0)+pts;
      });
    }
  });

  // 組 CSV
  let csv=`﻿路境行旅 每日計分表,${py}/${pm}/26 ～ ${S.year}/${S.month}/25
`;

  // 表頭
  csv+=`日期,${allStaff.map(s=>s.name).join(',')}
`;

  // 每日一行
  let totals={};
  allStaff.forEach(s=>totals[s.name]=0);

  dates.forEach(date=>{
    const cols=allStaff.map(s=>{
      if(s.type==='pt') return '—';
      const pts=Math.round(((scoreByDate[date]||{})[s.name]||0)*10)/10;
      totals[s.name]+=pts;
      return pts||0;
    });
    csv+=`${date},${cols.join(',')}
`;
  });

  // 合計行
  const totalCols=allStaff.map(s=>s.type==='pt'?'—':Math.round(totals[s.name]*10)/10);
  csv+=`本期合計,${totalCols.join(',')}
`;

  // 缺失紀錄
  csv+=`
缺失紀錄
日期,負責人,房號,說明
`;
  const defects=S.defects.filter(d=>{
    // 只列本期
    const cycleStart=`${py}-${String(pm).padStart(2,'0')}-26`;
    const cycleEnd=`${S.year}-${String(S.month).padStart(2,'0')}-25`;
    return d.date>=cycleStart&&d.date<=cycleEnd;
  }).sort((a,b)=>a.date.localeCompare(b.date));
  defects.forEach(d=>csv+=`${d.date},${d.name},${d.room},${d.note||''}
`);

  dl(csv,`每日計分_${py}${String(pm).padStart(2,'0')}.csv`);
}

function exportCSV(){
  const {sc,rooms,maintSc,workSc}=calcScores();
  const k=getK();
  const pm=S.month===1?12:S.month-1,py=S.month===1?S.year-1:S.year;
  let csv=`\uFEFF路境行旅 房務計分彙總,${py}/${pm}/26 ～ ${S.year}/${S.month}/25\n`;
  csv+=`姓名,類型,打掃間數,保養分,工作分,館長加分,缺失點,品質扣分,總分\n`;
  S.staff.forEach(s=>{
    const total=Math.round((sc[s.name]||0)*10)/10;
    const rc=rooms[s.name]||0;
    const def=S.defectCounts[s.name]||0;
    const deduct=s.type==='full'?Math.floor(def/5):0;
    const bonus=parseFloat((S.bonuses[k]||{})[s.name])||0;
    csv+=`${s.name},${s.type==='pt'?'PT':'正職'},${rc},${Math.round((maintSc[s.name]||0)*10)/10},${Math.round((workSc[s.name]||0)*10)/10},${bonus},${def},${deduct},${s.type==='pt'?'—':total}\n`;
  });
  dl(csv,`房務計分_${py}${String(pm).padStart(2,'0')}.csv`);
}
function exportDetailCSV(){
  const k=getK();
  const pm=S.month===1?12:S.month-1,py=S.month===1?S.year-1:S.year;
  let csv=`\uFEFF路境行旅 工作明細,${py}/${pm}/26 ～ ${S.year}/${S.month}/25\n`;
  csv+=`日期,工作項目,負責人,數量,每人得分\n`;
  Object.entries(S.daily[k]||{}).sort().forEach(([date,day])=>{
    (day.tasks||[]).forEach(t=>{
      if(!t.names||!t.names.length)return;
      const task=TASKS.find(dt=>dt.id===t.id);if(!task)return;
      const base=task.perUnit?task.score*(t.num||1):task.score;
      const per=task.multi?base/t.names.length:base;
      csv+=`${date},${task.label},"${t.names.join('、')}",${t.num||1},${Math.round(per*10)/10}\n`;
    });
    if(day.extra)csv+=`${date},額外項目,,,${day.extra}\n`;
  });
  csv+=`\n保養紀錄\n日期,樓層,房號,項目,負責人\n`;
  Object.entries(S.maint[k]||{}).forEach(([ck,v])=>{
    if(!v)return;const p=ck.split('|');
    csv+=`${v.date},${p[0]},${p[1]},${p[2]},${v.by}\n`;
  });
  csv+=`\n缺失紀錄\n日期,房號,負責人,說明\n`;
  S.defects.forEach(d=>csv+=`${d.date},${d.room},${d.name},${d.note||''}\n`);
  dl(csv,`工作明細_${py}${String(pm).padStart(2,'0')}.csv`);
}
function dl(csv,fn){
  const b=new Blob([csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=fn;a.click();toast('已匯出 '+fn);
}

// ── MODAL ──
function openModal(title,body,btns){
  document.getElementById('modal-title').textContent=title;
  document.getElementById('modal-body').innerHTML=body;
  document.getElementById('modal-btns').innerHTML=btns.map(b=>`<button class="btn ${b.c}" onclick="${b.f}">${b.l}</button>`).join('');
  document.getElementById('modal').classList.add('open');
}
function closeModal(){document.getElementById('modal').classList.remove('open');}
document.getElementById('modal').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal();});

load();initMonth();
document.getElementById('cycle-label').textContent=getCycleLabel();
renderDash();
loadFromSheet();
</script>
